<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TuesdayForYou</title>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Inter', sans-serif; }
    #bg-video { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; filter: brightness(0.4) grayscale(1); }
    .wash { position: fixed; inset: 0; z-index: 1; background: rgba(0,0,0,0.35); pointer-events: none; }
    #enter-screen { position: fixed; inset: 0; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; transition: opacity 1s ease, visibility 1s ease; }
    #enter-screen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    .pre-name { font-family: 'EB Garamond', serif; font-size: clamp(2rem, 5vw, 3.8rem); font-weight: 400; color: #fff; letter-spacing: 0.04em; margin-bottom: 3rem; }
    .pre-name i { font-style: italic; color: #999; }
    #enter-btn { font-family: 'Inter', sans-serif; font-weight: 300; font-size: 0.7rem; letter-spacing: 0.25em; text-transform: uppercase; color: #fff; background: transparent; border: 1px solid rgba(255,255,255,0.4); padding: 0.8rem 2.4rem; cursor: pointer; transition: border-color 0.2s, color 0.2s; }
    #enter-btn:hover { border-color: #fff; color: #fff; }
    #main { position: fixed; inset: 0; z-index: 2; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0; transition: opacity 2s ease; pointer-events: none; }
    #main.visible { opacity: 1; pointer-events: auto; }
    .name { font-family: 'EB Garamond', serif; font-size: clamp(2.6rem, 7vw, 6rem); font-weight: 400; color: #fff; letter-spacing: 0.06em; line-height: 1; text-align: center; transition: opacity 0.8s ease; }
    .name i { font-style: italic; color: rgba(255,255,255,0.45); }
    .name.gone { opacity: 0; pointer-events: none; }
    #top-left { position: fixed; top: 1.8rem; left: 2rem; z-index: 5; opacity: 0; pointer-events: none; transition: opacity 0.8s ease 0.3s; }
    #top-left.visible { opacity: 1; pointer-events: auto; }
    .name-small { font-family: 'EB Garamond', serif; font-size: clamp(1.1rem, 2vw, 1.5rem); font-weight: 400; color: #fff; letter-spacing: 0.06em; line-height: 1; }
    .name-small i { font-style: italic; color: rgba(255,255,255,0.45); }
    #bottom { position: fixed; bottom: 0; left: 0; right: 0; z-index: 3; display: flex; justify-content: space-between; align-items: flex-end; padding: 0 2rem 1.8rem; opacity: 0; transition: opacity 1.5s ease 1s; }
    #bottom.visible { opacity: 1; }
    .date-label { font-family: 'Inter', sans-serif; font-size: 0.62rem; font-weight: 300; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(255,255,255,0.3); }
    #mute-btn { background: transparent; border: none; cursor: pointer; display: flex; align-items: center; gap: 8px; color: rgba(255,255,255,0.35); font-family: 'Inter', sans-serif; font-size: 0.62rem; font-weight: 300; letter-spacing: 0.2em; text-transform: uppercase; transition: color 0.2s; }
    #mute-btn:hover { color: rgba(255,255,255,0.8); }
    .bars { display: flex; align-items: flex-end; gap: 2px; height: 12px; }
    .bars span { display: block; width: 2px; background: currentColor; border-radius: 1px; animation: pulse 1.4s ease-in-out infinite; }
    .bars span:nth-child(1) { height: 4px; animation-delay: 0s; }
    .bars span:nth-child(2) { height: 9px; animation-delay: 0.2s; }
    .bars span:nth-child(3) { height: 5px; animation-delay: 0.4s; }
    .bars span:nth-child(4) { height: 12px; animation-delay: 0.1s; }
    .bars span:nth-child(5) { height: 6px; animation-delay: 0.3s; }
    .bars.paused span { animation-play-state: paused; }
    @keyframes pulse { 0%, 100% { transform: scaleY(1); } 50% { transform: scaleY(0.25); } }
    #icons { position: fixed; bottom: 0; left: 0; right: 0; z-index: 4; display: flex; justify-content: center; align-items: center; gap: 3rem; padding-bottom: 1.6rem; opacity: 0; pointer-events: none; transition: opacity 0.8s ease 0.3s; }
    #icons.visible { opacity: 1; pointer-events: auto; }
    .icon-btn { display: flex; flex-direction: column; align-items: center; gap: 6px; background: transparent; border: none; cursor: pointer; color: rgba(255,255,255,0.4); text-decoration: none; transition: color 0.2s; }
    .icon-btn:hover { color: rgba(255,255,255,0.9); }
    .icon-btn svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
    .icon-label { font-family: 'Inter', sans-serif; font-size: 0.55rem; font-weight: 300; letter-spacing: 0.2em; text-transform: uppercase; }
    #yt-player { position: fixed; top: -9999px; left: -9999px; width: 1px; height: 1px; }
  </style>
</head>
<body>
  <video id="bg-video" autoplay muted loop playsinline src="https://www.w3schools.com/html/mov_bbb.mp4"></video>
  <div class="wash"></div>
  <div id="yt-player"></div>

  <div id="enter-screen">
    <p class="pre-name">Tuesday<i>For</i>You</p>
    <button id="enter-btn">enter</button>
  </div>

  <div id="main">
    <h1 class="name" id="main-name">Tuesday<i>For</i>You</h1>
  </div>

  <div id="top-left">
    <span class="name-small">Tuesday<i>For</i>You</span>
  </div>

  <div id="bottom">
    <span class="date-label" id="day-label"></span>
    <button id="mute-btn">
      <div class="bars" id="bars">
        <span></span><span></span><span></span><span></span><span></span>
      </div>
      <span id="mute-label">playing</span>
    </button>
  </div>

  <div id="icons">
    <a class="icon-btn" href="https://Discord.gg/luminox" target="_blank">
      <svg viewBox="0 0 24 24" fill="currentColor" stroke="none">
        <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.002.022.015.043.03.056a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/>
      </svg>
      <span class="icon-label">discord</span>
    </a>
    <button class="icon-btn" id="icon-mute-btn">
      <svg viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
      <span class="icon-label" id="icon-mute-label">music</span>
    </button>
    <button class="icon-btn" id="icon-info-btn">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12.01" y2="8"/><path d="M12 12v4"/></svg>
      <span class="icon-label">info</span>
    </button>
  </div>

  <script>
    const days = ['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];
    document.getElementById('day-label').textContent = days[new Date().getDay()];

    let player = null;
    let muted = false;
    let iconMuted = false;
    let transitioned = false;

    const tag = document.createElement('script');
    tag.src = 'https://www.youtube.com/iframe_api';
    document.head.appendChild(tag);

    window.onYouTubeIframeAPIReady = function () {
      player = new YT.Player('yt-player', {
        videoId: 'FPI1iRapBbM',
        playerVars: { autoplay: 0, controls: 0, loop: 1, playlist: 'FPI1iRapBbM', rel: 0 },
        events: { onReady: function() {} }
      });
    };

    document.getElementById('enter-btn').addEventListener('click', function () {
      if (player && player.playVideo) {
        player.playVideo();
        player.setVolume(75);
      }
      document.getElementById('enter-screen').classList.add('hidden');
      setTimeout(() => {
        document.getElementById('main').classList.add('visible');
        document.getElementById('bottom').classList.add('visible');
      }, 150);

      setTimeout(() => {
        if (transitioned) return;
        transitioned = true;
        document.getElementById('main-name').classList.add('gone');
        setTimeout(() => {
          document.getElementById('top-left').classList.add('visible');
          document.getElementById('icons').classList.add('visible');
        }, 500);
      }, 10000);
    });

    document.getElementById('mute-btn').addEventListener('click', function () {
      if (!player) return;
      muted = !muted;
      muted ? player.mute() : player.unMute();
      document.getElementById('bars').classList.toggle('paused', muted);
      document.getElementById('mute-label').textContent = muted ? 'muted' : 'playing';
    });

    document.getElementById('icon-mute-btn').addEventListener('click', function () {
      if (!player) return;
      iconMuted = !iconMuted;
      iconMuted ? player.mute() : player.unMute();
      document.getElementById('icon-mute-label').textContent = iconMuted ? 'muted' : 'music';
    });

    document.getElementById('icon-info-btn').addEventListener('click', function () {
      alert('TuesdayForYou');
    });
  </script>
</body>
</html>
