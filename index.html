<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tuesday For You</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --cream: #f0f0f0;
    --silver: #c8c8c8;
    --mid: #888888;
    --deep: #080808;
  }

  body {
    background: var(--deep);
    min-height: 100vh;
    overflow: hidden;
    font-family: 'Cormorant Garamond', serif;
  }

  /* ── SHARED ATMOSPHERE ── */
  .orb { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0; animation: orbFloat 12s ease-in-out infinite; pointer-events: none; }
  .orb1 { width: 500px; height: 500px; background: radial-gradient(circle, rgba(160,160,160,0.22) 0%, transparent 70%); top: -100px; left: -100px; animation-delay: 0s; }
  .orb2 { width: 600px; height: 600px; background: radial-gradient(circle, rgba(200,200,200,0.13) 0%, transparent 70%); bottom: -150px; right: -150px; animation-delay: 3s; }
  .orb3 { width: 350px; height: 350px; background: radial-gradient(circle, rgba(140,140,140,0.1) 0%, transparent 70%); top: 50%; left: 50%; transform: translate(-50%,-50%); animation-delay: 6s; }
  @keyframes orbFloat {
    0%   { opacity: 0; transform: scale(0.8) translate(0,0); }
    25%  { opacity: 1; }
    50%  { transform: scale(1.1) translate(20px,-30px); }
    75%  { opacity: 0.7; }
    100% { opacity: 0; transform: scale(0.8) translate(0,0); }
  }

  .particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .particle { position: absolute; width: 2px; height: 2px; background: #fff; border-radius: 50%; opacity: 0; animation: particleDrift linear infinite; }
  @keyframes particleDrift {
    0%   { opacity: 0; transform: translateY(100vh) scale(0); }
    10%  { opacity: 0.8; }
    90%  { opacity: 0.4; }
    100% { opacity: 0; transform: translateY(-10vh) scale(1.5); }
  }

  .scanline { position: fixed; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, rgba(200,200,200,0.35), transparent); animation: scanDown 8s ease-in-out infinite; opacity: 0; pointer-events: none; z-index: 1; }
  @keyframes scanDown {
    0%   { top: 0; opacity: 0; }
    5%   { opacity: 1; }
    95%  { opacity: 0.3; }
    100% { top: 100vh; opacity: 0; }
  }

  /* ── INTRO SCREEN ── */
  #intro {
    position: fixed; inset: 0; z-index: 30;
    display: flex; align-items: center; justify-content: center;
    transition: opacity 1.6s cubic-bezier(0.16,1,0.3,1);
  }
  #intro.fade-out { opacity: 0; pointer-events: none; }

  .intro-rings { position: absolute; inset: 0; pointer-events: none; }
  .ring { position: absolute; top: 50%; left: 50%; border-radius: 50%; border: 1px solid rgba(200,200,200,0.1); opacity: 0; animation: ringPulse 5s ease-out infinite; }
  .ring:nth-child(1) { width: 340px; height: 340px; margin: -170px 0 0 -170px; animation-delay: 2s; }
  .ring:nth-child(2) { width: 480px; height: 480px; margin: -240px 0 0 -240px; animation-delay: 2.8s; }
  .ring:nth-child(3) { width: 620px; height: 620px; margin: -310px 0 0 -310px; animation-delay: 3.6s; }
  @keyframes ringPulse {
    0%   { opacity: 0; transform: scale(0.5); }
    20%  { opacity: 0.6; }
    100% { opacity: 0; transform: scale(1); }
  }

  .intro-center { text-align: center; position: relative; z-index: 2; }

  .day-label {
    font-family: 'Cormorant Garamond', serif; font-weight: 300; font-style: italic;
    font-size: clamp(0.9rem, 2vw, 1.1rem); letter-spacing: 0.5em; color: var(--silver);
    text-transform: uppercase; opacity: 0; transform: translateY(20px);
    animation: fadeUp 1.2s ease forwards 0.4s; margin-bottom: 1.5rem;
  }
  .intro-title {
    font-family: 'Playfair Display', serif; font-weight: 400;
    font-size: clamp(3.5rem, 10vw, 8rem); line-height: 1;
    color: var(--cream); opacity: 0; transform: translateY(30px) scale(0.96);
    animation: heroReveal 1.6s cubic-bezier(0.16,1,0.3,1) forwards 0.8s; position: relative;
  }
  .word-tuesday { display: block; position: relative; }
  .word-for { display: block; font-style: italic; font-size: 0.55em; color: var(--silver); letter-spacing: 0.12em; margin: 0.2em 0; }
  .word-you { display: block; }
  .word-tuesday::after {
    content: 'Tuesday'; position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent 0%, rgba(220,220,220,0.7) 50%, transparent 100%);
    background-size: 200% 100%; -webkit-background-clip: text; background-clip: text; color: transparent;
    animation: shimmer 4s ease-in-out infinite 2.5s; opacity: 0; animation-fill-mode: forwards;
  }
  @keyframes shimmer {
    0%   { background-position: -200% 0; opacity: 0; }
    10%  { opacity: 1; }
    50%  { background-position: 200% 0; }
    60%  { opacity: 0; }
    100% { background-position: 200% 0; opacity: 0; }
  }
  .deco-line { width: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--silver), transparent); margin: 2rem auto; animation: expandLine 1.4s ease forwards 2s; }
  @keyframes expandLine { to { width: 280px; } }
  .subtitle {
    font-family: 'Cormorant Garamond', serif; font-weight: 300; font-style: italic;
    font-size: clamp(0.85rem, 2vw, 1rem); letter-spacing: 0.3em; color: rgba(240,240,240,0.32);
    text-transform: uppercase; opacity: 0; transform: translateY(10px);
    animation: fadeUp 1s ease forwards 2.4s;
  }

  @keyframes fadeUp     { to { opacity: 1; transform: translateY(0); } }
  @keyframes heroReveal { to { opacity: 1; transform: translateY(0) scale(1); } }

  /* ── MAIN PAGE ── */
  #main {
    position: fixed; inset: 0; z-index: 20;
    opacity: 0; pointer-events: none;
    transition: opacity 1.6s cubic-bezier(0.16,1,0.3,1);
  }
  #main.visible { opacity: 1; pointer-events: all; }

  /* Corner logo */
  .corner-logo {
    position: absolute; top: 2rem; left: 2rem; z-index: 10;
    opacity: 0; transform: translateY(-10px);
    transition: opacity 0s, transform 0s;
  }
  #main.visible .corner-logo {
    animation: fadeUp 1s ease forwards 0.3s;
  }
  .corner-logo .cl-for { font-family: 'Playfair Display', serif; font-style: italic; font-weight: 400; font-size: 0.75rem; color: var(--silver); letter-spacing: 0.15em; display: block; }
  .corner-logo .cl-main { font-family: 'Playfair Display', serif; font-weight: 400; font-size: 1.45rem; color: var(--cream); letter-spacing: 0.04em; line-height: 1.1; display: block; }

  /* Center content */
  .main-content {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 3.5rem;
  }

  .main-tagline {
    font-family: 'Cormorant Garamond', serif; font-style: italic; font-weight: 300;
    font-size: clamp(0.8rem, 1.5vw, 1rem); letter-spacing: 0.45em; color: rgba(200,200,200,0.4);
    text-transform: uppercase;
    opacity: 0; transform: translateY(16px);
  }
  #main.visible .main-tagline { animation: fadeUp 1s ease forwards 0.5s; }

  .socials-grid {
    display: flex; flex-direction: column; gap: 1.2rem; align-items: center; width: 100%; max-width: 420px; padding: 0 2rem;
  }

  .social-card {
    width: 100%; display: flex; align-items: center; gap: 1.4rem;
    padding: 1.1rem 1.6rem; border-radius: 4px;
    border: 1px solid rgba(255,255,255,0.07);
    background: rgba(255,255,255,0.03);
    cursor: pointer; text-decoration: none; color: inherit;
    position: relative; overflow: hidden;
    transition: border-color 0.3s ease, background 0.3s ease, transform 0.3s ease;
    opacity: 0; transform: translateY(22px);
  }
  .social-card::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.04), transparent);
    transform: translateX(-100%); transition: transform 0.5s ease;
  }
  .social-card:hover::before { transform: translateX(100%); }
  .social-card:hover {
    border-color: rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.06);
    transform: translateX(4px);
  }

  #main.visible .social-card:nth-child(1) { animation: fadeUp 1s ease forwards 0.7s; }
  #main.visible .social-card:nth-child(2) { animation: fadeUp 1s ease forwards 0.9s; }

  .social-icon { width: 36px; height: 36px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .social-icon svg { width: 100%; height: 100%; }

  .social-info { flex: 1; }
  .social-name { font-family: 'Playfair Display', serif; font-weight: 400; font-size: 1.05rem; color: var(--cream); letter-spacing: 0.05em; display: block; }
  .social-sub { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 0.8rem; color: rgba(200,200,200,0.4); letter-spacing: 0.1em; display: block; margin-top: 0.15rem; }

  .social-arrow { color: rgba(200,200,200,0.25); font-size: 1rem; transition: transform 0.3s ease, color 0.3s ease; }
  .social-card:hover .social-arrow { transform: translateX(4px); color: rgba(200,200,200,0.6); }

  /* Discord popup */
  .discord-popup {
    position: fixed; inset: 0; z-index: 100;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s ease;
  }
  .discord-popup.show { opacity: 1; pointer-events: all; }
  .popup-box {
    background: #0f0f0f; border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px; padding: 2.4rem 3rem; text-align: center;
    transform: scale(0.92) translateY(12px);
    transition: transform 0.35s cubic-bezier(0.16,1,0.3,1);
    position: relative; min-width: 300px;
  }
  .discord-popup.show .popup-box { transform: scale(1) translateY(0); }
  .popup-label { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 0.8rem; letter-spacing: 0.3em; color: rgba(200,200,200,0.4); text-transform: uppercase; margin-bottom: 1rem; display: block; }
  .popup-username {
    font-family: 'Playfair Display', serif; font-size: 1.6rem; color: var(--cream);
    letter-spacing: 0.03em; display: block; margin-bottom: 1.4rem; cursor: pointer;
    position: relative;
  }
  .popup-username::after {
    content: 'copied!'; position: absolute; top: -1.6rem; left: 50%; transform: translateX(-50%);
    font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 0.75rem;
    color: var(--silver); letter-spacing: 0.2em; opacity: 0;
    transition: opacity 0.3s ease, top 0.3s ease;
  }
  .popup-username.copied::after { opacity: 1; top: -2rem; }
  .popup-close {
    position: absolute; top: 1rem; right: 1.2rem; background: none; border: none;
    color: rgba(200,200,200,0.35); font-size: 1.2rem; cursor: pointer;
    transition: color 0.2s ease; font-family: inherit;
  }
  .popup-close:hover { color: var(--cream); }
  .copy-hint { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 0.78rem; color: rgba(200,200,200,0.3); letter-spacing: 0.1em; }

  /* music bar */
  .music-indicator { position: fixed; bottom: 2rem; right: 2rem; display: flex; align-items: center; gap: 0.6rem; z-index: 100; opacity: 0; }
  #main.visible .music-indicator { animation: fadeUp 1s ease forwards 1.2s; }
  .music-label { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 0.8rem; letter-spacing: 0.2em; color: rgba(200,200,200,0.4); }
  .bars { display: flex; align-items: flex-end; gap: 3px; height: 18px; }
  .bar { width: 3px; background: #aaa; opacity: 0.45; border-radius: 2px; animation: barBounce 0.8s ease-in-out infinite alternate; }
  .bar:nth-child(1) { height: 8px; animation-delay: 0s; }
  .bar:nth-child(2) { height: 14px; animation-delay: 0.15s; }
  .bar:nth-child(3) { height: 10px; animation-delay: 0.3s; }
  .bar:nth-child(4) { height: 16px; animation-delay: 0.1s; }
  .bar:nth-child(5) { height: 7px; animation-delay: 0.25s; }
  @keyframes barBounce { from { transform: scaleY(0.3); } to { transform: scaleY(1); } }

  #yt-player { display: none; }
</style>
</head>
<body>

<!-- atmosphere -->
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>
<div class="scanline"></div>
<div class="particles" id="particles"></div>

<!-- INTRO -->
<div id="intro">
  <div class="intro-rings">
    <div class="ring"></div>
    <div class="ring"></div>
    <div class="ring"></div>
  </div>
  <div class="intro-center">
    <p class="day-label">every single week</p>
    <h1 class="intro-title">
      <span class="word-tuesday">Tuesday</span>
      <span class="word-for">for</span>
      <span class="word-you">You</span>
    </h1>
    <div class="deco-line"></div>
    <p class="subtitle">always &nbsp;&bull;&nbsp; forever &nbsp;&bull;&nbsp; yours</p>
  </div>
</div>

<!-- MAIN PAGE -->
<div id="main">
  <!-- corner logo -->
  <div class="corner-logo">
    <span class="cl-main">Tuesday <em style="font-style:italic;font-size:0.7em;color:var(--silver);letter-spacing:0.08em;">for</em> You</span>
  </div>

  <div class="main-content">
    <p class="main-tagline">find me here</p>

    <div class="socials-grid">

      <!-- YouTube -->
      <a class="social-card" href="https://www.youtube.com/@Trappprod" target="_blank" rel="noopener">
        <div class="social-icon">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z" fill="#ffffff" opacity="0.85"/>
          </svg>
        </div>
        <div class="social-info">
          <span class="social-name">YouTube</span>
          <span class="social-sub">@Trappprod</span>
        </div>
        <span class="social-arrow">→</span>
      </a>

      <!-- Discord -->
      <div class="social-card" id="discordCard">
        <div class="social-icon">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.002.022.015.043.033.055a19.86 19.86 0 0 0 5.993 3.03.077.077 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z" fill="#ffffff" opacity="0.85"/>
          </svg>
        </div>
        <div class="social-info">
          <span class="social-name">Discord</span>
          <span class="social-sub">click to reveal</span>
        </div>
        <span class="social-arrow">→</span>
      </div>

    </div>
  </div>

  <div class="music-indicator">
    <span class="music-label">now playing</span>
    <div class="bars">
      <div class="bar"></div><div class="bar"></div><div class="bar"></div>
      <div class="bar"></div><div class="bar"></div>
    </div>
  </div>
</div>

<!-- Discord popup -->
<div class="discord-popup" id="discordPopup">
  <div class="popup-box">
    <button class="popup-close" id="popupClose">✕</button>
    <span class="popup-label">discord username</span>
    <span class="popup-username" id="discordUsername">tuesdaythefatloser</span>
    <p class="copy-hint">tap username to copy</p>
  </div>
</div>

<div id="yt-player"></div>

<script>
  // Particles
  const pc = document.getElementById('particles');
  for (let i = 0; i < 55; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + 'vw';
    p.style.width = p.style.height = (Math.random() * 2 + 1) + 'px';
    p.style.animationDuration = (Math.random() * 18 + 10) + 's';
    p.style.animationDelay = (Math.random() * 15) + 's';
    p.style.opacity = Math.random() * 0.5;
    pc.appendChild(p);
  }

  // Transition: after 20s, fade out intro, fade in main
  setTimeout(() => {
    const intro = document.getElementById('intro');
    const main  = document.getElementById('main');
    intro.classList.add('fade-out');
    setTimeout(() => {
      intro.style.display = 'none';
      main.classList.add('visible');
    }, 1600);
  }, 20000);

  // Discord popup
  const discordCard    = document.getElementById('discordCard');
  const discordPopup   = document.getElementById('discordPopup');
  const popupClose     = document.getElementById('popupClose');
  const discordUsername= document.getElementById('discordUsername');

  discordCard.addEventListener('click', () => discordPopup.classList.add('show'));
  popupClose.addEventListener('click',  () => discordPopup.classList.remove('show'));
  discordPopup.addEventListener('click', e => { if (e.target === discordPopup) discordPopup.classList.remove('show'); });

  discordUsername.addEventListener('click', () => {
    navigator.clipboard.writeText('tuesdaythefatloser').catch(() => {});
    discordUsername.classList.add('copied');
    setTimeout(() => discordUsername.classList.remove('copied'), 2000);
  });

  // YouTube
  var tag = document.createElement('script');
  tag.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(tag);
  function onYouTubeIframeAPIReady() {
    new YT.Player('yt-player', {
      height: '1', width: '1',
      videoId: 'eeuObHs01VM',
      playerVars: { autoplay: 1, loop: 1, playlist: 'eeuObHs01VM', controls: 0, mute: 0 },
      events: { onReady: function(e) { e.target.playVideo(); } }
    });
  }
</script>
</body>
</html>
