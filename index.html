<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TuesdayForYou</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0b;
      --surface: #111113;
      --surface2: #18181c;
      --border: rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.12);
      --text: #f0ede8;
      --muted: #5a5760;
      --subtle: #2e2c35;
      --accent: #c8b98a;
      --accent2: #e8d9b0;
      --glow: rgba(200,185,138,0.15);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Ambient background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 600px 400px at 20% 50%, rgba(200,185,138,0.04) 0%, transparent 70%),
        radial-gradient(ellipse 400px 600px at 80% 30%, rgba(120,100,180,0.03) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 28px 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }

    .brand {
      font-family: 'DM Serif Display', serif;
      font-size: 26px;
      font-weight: 400;
      letter-spacing: -0.5px;
      color: var(--text);
      line-height: 1;
      flex-shrink: 0;
      padding-top: 4px;
    }
    .brand span {
      color: var(--accent);
    }

    /* ── Verse box ── */
    .verse-box {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px 14px;
      max-width: 175px;
      position: relative;
      overflow: hidden;
    }
    .verse-box::before {
      content: '"';
      font-family: 'DM Serif Display', serif;
      font-size: 60px;
      color: var(--accent);
      opacity: 0.08;
      position: absolute;
      top: -10px;
      left: 6px;
      line-height: 1;
      pointer-events: none;
    }
    .verse-text {
      font-size: 10.5px;
      line-height: 1.7;
      color: #8a8590;
      font-style: italic;
      transition: opacity 0.3s;
      position: relative;
    }
    .verse-ref {
      font-size: 9.5px;
      color: var(--accent);
      opacity: 0.7;
      margin-top: 6px;
      letter-spacing: 0.5px;
      font-weight: 500;
      transition: opacity 0.3s;
    }
    .verse-btn {
      display: block;
      margin-top: 8px;
      background: none;
      border: none;
      font-size: 9px;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--muted);
      cursor: pointer;
      padding: 0;
      font-family: 'DM Sans', sans-serif;
      transition: color 0.2s;
    }
    .verse-btn:hover { color: var(--accent); }

    /* ── Player card ── */
    .player {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 22px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      position: relative;
      overflow: hidden;
      box-shadow:
        0 1px 0 rgba(255,255,255,0.04) inset,
        0 40px 80px rgba(0,0,0,0.4);
    }
    /* Subtle top shine */
    .player::after {
      content: '';
      position: absolute;
      top: 0; left: 16px; right: 16px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
    }

    /* ── Track row ── */
    .track-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .track-info { flex: 1; min-width: 0; }
    .track-name {
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: -0.2px;
    }
    .track-sub {
      font-size: 10px;
      color: var(--muted);
      margin-top: 2px;
      letter-spacing: 0.3px;
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: 4px 10px 4px 7px;
      flex-shrink: 0;
    }
    .status-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--subtle);
      transition: background 0.3s, box-shadow 0.3s;
    }
    .status-dot.on {
      background: var(--accent);
      box-shadow: 0 0 6px var(--glow);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .status-text {
      font-size: 9.5px;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 500;
    }

    /* ── Visualizer ── */
    .vis-wrap {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      height: 52px;
    }
    #visualizer { display: block; }

    /* ── Progress ── */
    .progress-track {
      width: 100%; height: 3px;
      background: var(--subtle);
      border-radius: 99px;
      position: relative;
      cursor: pointer;
    }
    .progress-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 99px;
      transition: width 0.1s linear;
      pointer-events: none;
    }
    .progress-thumb {
      position: absolute; top: 50%; left: 0;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--accent2);
      transform: translate(-50%, -50%);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
      box-shadow: 0 0 8px var(--glow);
    }
    .progress-track:hover .progress-thumb { opacity: 1; }

    .time-row {
      display: flex; justify-content: space-between;
      margin-top: -4px;
    }
    .t { font-size: 10px; color: var(--muted); font-variant-numeric: tabular-nums; }

    /* ── Controls ── */
    .controls {
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .ctrl {
      background: none; border: none; cursor: pointer;
      padding: 8px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .ctrl:hover { background: var(--surface2); }
    .ctrl svg { width: 16px; height: 16px; fill: var(--muted); transition: fill 0.15s; }
    .ctrl:hover svg { fill: var(--text); }
    .ctrl.on svg { fill: var(--accent); }

    .play-btn {
      width: 46px; height: 46px;
      border-radius: 50%;
      border: 1px solid var(--border2);
      background: var(--surface2);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, border-color 0.15s, box-shadow 0.15s, transform 0.1s;
      position: relative;
    }
    .play-btn::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(200,185,138,0.2), transparent);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .play-btn:hover { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 20px var(--glow); }
    .play-btn:hover::before { opacity: 1; }
    .play-btn:hover svg { fill: #0a0a0b; }
    .play-btn:active { transform: scale(0.94); }
    .play-btn svg { width: 16px; height: 16px; fill: var(--text); transition: fill 0.15s; position: relative; z-index: 1; }

    /* ── Volume ── */
    .vol-row {
      display: flex; align-items: center; gap: 10px;
    }
    .vol-icon { width: 13px; height: 13px; fill: var(--muted); flex-shrink: 0; }
    input[type=range] {
      flex: 1; -webkit-appearance: none; appearance: none;
      height: 3px;
      background: linear-gradient(to right, var(--accent) var(--fill,80%), var(--subtle) var(--fill,80%));
      border-radius: 99px; outline: none; cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: var(--accent2);
      cursor: pointer;
      box-shadow: 0 0 6px var(--glow);
    }
    input[type=range]::-moz-range-thumb {
      width: 12px; height: 12px;
      border-radius: 50%; background: var(--accent2); border: none; cursor: pointer;
    }
    .vol-pct { font-size: 10px; color: var(--muted); min-width: 28px; text-align: right; }

    /* ── Autoplay notice ── */
    .autoplay-hint {
      text-align: center;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.5px;
      opacity: 0;
      transition: opacity 0.4s;
      height: 0;
      overflow: hidden;
    }
    .autoplay-hint.show {
      opacity: 1;
      height: auto;
    }

    .no-track {
      font-size: 11px; color: var(--muted); text-align: center;
      line-height: 1.6; display: none;
    }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: var(--border);
      margin: -4px 0;
    }
  </style>
</head>
<body>
<div class="page">

  <div class="header">
    <div class="brand">Tuesday<span>For</span>You</div>
    <div class="verse-box">
      <div class="verse-text" id="verseText"></div>
      <div class="verse-ref" id="verseRef"></div>
      <button class="verse-btn" onclick="loadVerse()">↻ new verse</button>
    </div>
  </div>

  <div class="player">
    <div class="track-row">
      <div class="track-info">
        <div class="track-name" id="trackName">—</div>
        <div class="track-sub">ambient · slowed</div>
      </div>
      <div class="status-pill">
        <div class="status-dot" id="statusDot"></div>
        <span class="status-text" id="statusText">Ready</span>
      </div>
    </div>

    <div class="vis-wrap">
      <canvas id="visualizer" width="340" height="52"></canvas>
    </div>

    <div>
      <div class="progress-track" id="progressBar">
        <div class="progress-fill" id="progressFill"></div>
        <div class="progress-thumb" id="progressThumb"></div>
      </div>
      <div class="time-row">
        <span class="t" id="curTime">0:00</span>
        <span class="t" id="durTime">0:00</span>
      </div>
    </div>

    <div class="controls">
      <button class="ctrl" id="btnLoop" title="Loop" onclick="toggleLoop()">
        <svg viewBox="0 0 24 24"><path d="M17 17H7V14L3 18l4 4v-3h12v-6h-2v4zM7 7h10v3l4-4-4-4v3H5v6h2V7z"/></svg>
      </button>
      <button class="play-btn" onclick="togglePlay()" id="playBtn">
        <svg id="iconPlay" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        <svg id="iconPause" viewBox="0 0 24 24" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
      </button>
      <button class="ctrl" onclick="toggleMute()">
        <svg id="iconVol" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
        <svg id="iconMute" viewBox="0 0 24 24" style="display:none"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
      </button>
    </div>

    <div class="divider"></div>

    <div class="vol-row">
      <svg class="vol-icon" viewBox="0 0 24 24"><path d="M5 9v6h4l5 5V4L9 9H5z"/></svg>
      <input type="range" id="volSlider" min="0" max="1" step="0.01" value="0.8" oninput="setVolume(this.value)"/>
      <span class="vol-pct" id="volPct">80%</span>
    </div>

    <div class="autoplay-hint" id="autoplayHint">Tap play to start — browser requires interaction first</div>
    <div class="no-track" id="noTrack">Place <strong>Pass Out (Slowed).mp3</strong> in the same folder.</div>
  </div>

</div>

<audio id="audioEl" preload="auto"></audio>

<script>
  const verses = [
    { text: "How great you are — there is no one like you.", ref: "2 Samuel 7:22" },
    { text: "I can do all this through him who gives me strength.", ref: "Philippians 4:13" },
    { text: "For God so loved the world that he gave his one and only Son.", ref: "John 3:16" },
    { text: "Trust in the Lord with all your heart.", ref: "Proverbs 3:5" },
    { text: "The Lord is my shepherd, I lack nothing.", ref: "Psalm 23:1" },
    { text: "Do not be afraid, for the Lord your God will be with you.", ref: "Joshua 1:9" },
    { text: "In all things God works for the good of those who love him.", ref: "Romans 8:28" },
    { text: "Those who hope in the Lord will renew their strength.", ref: "Isaiah 40:31" },
    { text: "Give thanks to the Lord, for he is good.", ref: "Psalm 107:1" },
    { text: "I know the plans I have for you — plans to give you hope and a future.", ref: "Jeremiah 29:11" },
  ];

  let lastIdx = -1;
  function loadVerse() {
    let idx;
    do { idx = Math.floor(Math.random() * verses.length); } while (idx === lastIdx && verses.length > 1);
    lastIdx = idx;
    const v = verses[idx];
    const t = document.getElementById('verseText');
    const r = document.getElementById('verseRef');
    t.style.opacity = 0; r.style.opacity = 0;
    setTimeout(() => {
      t.textContent = v.text;
      r.textContent = v.ref;
      t.style.opacity = 1; r.style.opacity = 1;
    }, 200);
  }
  loadVerse();

  const audio = document.getElementById('audioEl');
  let audioCtx, analyser, source, dataArr;
  let isLooping = false, isMuted = false;
  let autoplayBlocked = false;

  function initAudio() {
    audio.src = 'Pass Out (Slowed).mp3';
    document.getElementById('trackName').textContent = 'Pass Out (Slowed)';
    audio.addEventListener('canplay', () => {
      setupVis();
      audio.volume = 0.8;
      // Try autoplay
      const p = audio.play();
      if (p !== undefined) {
        p.catch(() => {
          autoplayBlocked = true;
          const hint = document.getElementById('autoplayHint');
          hint.classList.add('show');
          setStatus('Tap play');
        });
      }
    });
    audio.addEventListener('play', onPlay);
    audio.addEventListener('pause', onPause);
    audio.addEventListener('ended', onEnded);
    audio.addEventListener('timeupdate', updateProgress);
    audio.addEventListener('error', () => {
      setStatus('No track');
      document.getElementById('trackName').textContent = 'No track found';
      document.getElementById('noTrack').style.display = 'block';
    });
  }

  function setupVis() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    source = audioCtx.createMediaElementSource(audio);
    source.connect(analyser);
    analyser.connect(audioCtx.destination);
    dataArr = new Uint8Array(analyser.frequencyBinCount);
  }

  const canvas = document.getElementById('visualizer');
  const ctx = canvas.getContext('2d');

  // Scale canvas for sharpness
  const dpr = window.devicePixelRatio || 1;
  canvas.width = 340 * dpr;
  canvas.height = 52 * dpr;
  canvas.style.width = '340px';
  canvas.style.height = '52px';
  ctx.scale(dpr, dpr);

  let animFrame = null;
  function drawLoop() {
    animFrame = requestAnimationFrame(drawLoop);
    ctx.clearRect(0, 0, 340, 52);

    const bars = 42, bw = 3, gap = 4.5;
    const totalW = bars * (bw + gap) - gap;
    const startX = (340 - totalW) / 2;

    for (let i = 0; i < bars; i++) {
      let val = 0;
      if (analyser && !audio.paused) {
        analyser.getByteFrequencyData(dataArr);
        // Focus on lower-mid frequencies for a musical look
        const idx = Math.floor(i * (dataArr.length * 0.6) / bars);
        val = dataArr[idx] / 255;
      } else {
        // Idle animation
        const t = Date.now() / 1200;
        val = (Math.sin(i * 0.4 + t) * 0.5 + 0.5) * 0.08 + 0.02;
      }

      const h = Math.max(2, val * 44);
      const x = startX + i * (bw + gap);
      const y = 52 - h;

      // Gradient bar: gold top fading down
      const grad = ctx.createLinearGradient(0, y, 0, 52);
      if (!audio.paused && val > 0.05) {
        grad.addColorStop(0, `rgba(200,185,138,${0.6 + val * 0.4})`);
        grad.addColorStop(1, `rgba(200,185,138,0.05)`);
      } else {
        grad.addColorStop(0, `rgba(80,75,90,0.5)`);
        grad.addColorStop(1, `rgba(80,75,90,0.05)`);
      }

      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.roundRect(x, y, bw, h, [1.5, 1.5, 0, 0]);
      ctx.fill();
    }
  }
  drawLoop();

  function togglePlay() {
    if (!audioCtx) setupVis();
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    if (audio.paused) {
      audio.play();
      // Hide hint once user interacts
      document.getElementById('autoplayHint').classList.remove('show');
    } else {
      audio.pause();
    }
  }

  function toggleLoop() {
    isLooping = !isLooping;
    audio.loop = isLooping;
    document.getElementById('btnLoop').classList.toggle('on', isLooping);
  }

  function toggleMute() {
    isMuted = !isMuted;
    audio.muted = isMuted;
    document.getElementById('iconVol').style.display = isMuted ? 'none' : '';
    document.getElementById('iconMute').style.display = isMuted ? '' : 'none';
  }

  function setVolume(v) {
    audio.volume = parseFloat(v);
    document.getElementById('volPct').textContent = Math.round(v * 100) + '%';
    document.getElementById('volSlider').style.setProperty('--fill', (v * 100) + '%');
  }
  document.getElementById('volSlider').style.setProperty('--fill', '80%');

  function setStatus(t) { document.getElementById('statusText').textContent = t; }

  function onPlay() {
    document.getElementById('iconPlay').style.display = 'none';
    document.getElementById('iconPause').style.display = '';
    document.getElementById('statusDot').classList.add('on');
    setStatus('Playing');
  }
  function onPause() {
    document.getElementById('iconPlay').style.display = '';
    document.getElementById('iconPause').style.display = 'none';
    document.getElementById('statusDot').classList.remove('on');
    setStatus('Paused');
  }
  function onEnded() {
    document.getElementById('statusDot').classList.remove('on');
    setStatus('Ended');
    document.getElementById('iconPlay').style.display = '';
    document.getElementById('iconPause').style.display = 'none';
  }

  function updateProgress() {
    const cur = audio.currentTime, dur = audio.duration || 0;
    const pct = dur ? (cur / dur) * 100 : 0;
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressThumb').style.left = pct + '%';
    document.getElementById('curTime').textContent = fmt(cur);
    document.getElementById('durTime').textContent = fmt(dur);
  }

  function fmt(s) {
    if (!s || isNaN(s)) return '0:00';
    return Math.floor(s / 60) + ':' + String(Math.floor(s % 60)).padStart(2, '0');
  }

  document.getElementById('progressBar').addEventListener('click', e => {
    const r = e.currentTarget.getBoundingClientRect();
    audio.currentTime = ((e.clientX - r.left) / r.width) * (audio.duration || 0);
  });

  initAudio();
</script>
</body>
</html>
