
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #fff; color: #111; font-family: var(--font-sans, system-ui, sans-serif); }
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 28px;
    height: 56px;
    border-bottom: 0.5px solid #e0e0e0;
    background: #fff;
  }
  .brand {
    font-size: 17px;
    font-weight: 500;
    letter-spacing: -0.3px;
    color: #111;
  }
  .status-badge {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 13px;
    font-weight: 500;
    padding: 5px 12px;
    border-radius: 20px;
    border: 0.5px solid transparent;
    transition: background 0.4s ease, color 0.4s ease, border-color 0.4s ease;
  }
  .status-badge.connecting {
    background: #f5f5f5;
    color: #666;
    border-color: #e0e0e0;
  }
  .status-badge.offline {
    background: #fdf2f2;
    color: #b91c1c;
    border-color: #fca5a5;
  }
  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
    transition: background 0.4s ease;
  }
  .dot.pulse {
    background: #aaa;
    animation: pulse 1.1s infinite;
  }
  .dot.red {
    background: #dc2626;
    animation: none;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.25; }
  }
  .main {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: calc(100vh - 56px);
    gap: 0;
    padding: 48px 24px;
  }
  .card {
    background: #fff;
    border: 0.5px solid #e5e5e5;
    border-radius: 16px;
    padding: 48px 52px;
    max-width: 420px;
    width: 100%;
    text-align: center;
    transition: border-color 0.4s ease;
  }
  .card.error-card { border-color: #fca5a5; }
  .icon-wrap {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
    transition: background 0.4s ease;
  }
  .icon-wrap.connecting-icon { background: #f5f5f5; }
  .icon-wrap.error-icon { background: #fdf2f2; }
  .spinner {
    width: 26px;
    height: 26px;
    border: 2.5px solid #d0d0d0;
    border-top-color: #555;
    border-radius: 50%;
    animation: spin 0.85s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .state-title {
    font-size: 20px;
    font-weight: 500;
    color: #111;
    margin-bottom: 10px;
    transition: color 0.4s ease;
  }
  .state-title.error-title { color: #b91c1c; }
  .state-sub {
    font-size: 14px;
    color: #777;
    line-height: 1.6;
    margin-bottom: 28px;
    min-height: 44px;
  }
  .try-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: #111;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 11px 24px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s ease, transform 0.1s ease, opacity 0.3s ease;
    opacity: 0;
    pointer-events: none;
  }
  .try-btn.visible {
    opacity: 1;
    pointer-events: all;
  }
  .try-btn:hover { background: #333; }
  .try-btn:active { transform: scale(0.97); }
  .try-btn:disabled {
    background: #aaa;
    cursor: not-allowed;
    transform: none;
  }
  .err-code {
    margin-top: 24px;
    font-size: 12px;
    color: #bbb;
    letter-spacing: 0.5px;
    opacity: 0;
    transition: opacity 0.5s ease;
    font-family: var(--font-mono, monospace);
  }
  .err-code.visible { opacity: 1; }
  .fade-enter { animation: fadeIn 0.5s ease forwards; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
</style>

<div class="topbar">
  <span class="brand">tuesdayforyou</span>
  <span class="status-badge connecting" id="badge">
    <span class="dot pulse" id="dot"></span>
    <span id="badge-text">Connecting</span>
  </span>
</div>

<div class="main">
  <div class="card" id="card">
    <div class="icon-wrap connecting-icon" id="icon-wrap">
      <div class="spinner" id="spinner"></div>
    </div>
    <div class="state-title" id="state-title">Connecting…</div>
    <div class="state-sub" id="state-sub">Establishing a connection to the server. This should only take a moment.</div>
    <button class="try-btn" id="try-btn" onclick="retryConnect()">
      <i class="ti ti-refresh" aria-hidden="true"></i>
      Try again
    </button>
    <div class="err-code" id="err-code">ERR_CONNECTION_REFUSED · 503</div>
  </div>
</div>

<script>
  let attempt = 0;
  const badge = document.getElementById('badge');
  const dot = document.getElementById('dot');
  const badgeText = document.getElementById('badge-text');
  const card = document.getElementById('card');
  const iconWrap = document.getElementById('icon-wrap');
  const spinner = document.getElementById('spinner');
  const stateTitle = document.getElementById('state-title');
  const stateSub = document.getElementById('state-sub');
  const tryBtn = document.getElementById('try-btn');
  const errCode = document.getElementById('err-code');

  function setConnecting() {
    badge.className = 'status-badge connecting';
    dot.className = 'dot pulse';
    badgeText.textContent = 'Connecting';
    card.className = 'card';
    iconWrap.className = 'icon-wrap connecting-icon';
    spinner.style.display = 'block';
    stateTitle.className = 'state-title';
    stateTitle.textContent = attempt === 0 ? 'Connecting…' : 'Retrying…';
    stateSub.textContent = attempt === 0
      ? 'Establishing a connection to the server. This should only take a moment.'
      : 'Attempting to reconnect. Please wait.';
    tryBtn.classList.remove('visible');
    tryBtn.disabled = true;
    errCode.classList.remove('visible');
  }

  function setFailed() {
    badge.className = 'status-badge offline';
    dot.className = 'dot red';
    badgeText.textContent = 'Offline';
    card.className = 'card error-card fade-enter';
    iconWrap.className = 'icon-wrap error-icon';
    spinner.style.display = 'none';
    iconWrap.innerHTML = '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#dc2626" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>';
    stateTitle.className = 'state-title error-title';
    stateTitle.textContent = 'Connection failed';
    stateSub.textContent = attempt === 1
      ? 'Unable to reach the server. Check your network or try again.'
      : 'Still unable to connect. The server may be down or unreachable.';
    tryBtn.disabled = false;
    tryBtn.classList.add('visible');
    errCode.classList.add('visible');
  }

  function retryConnect() {
    attempt++;
    setConnecting();
    setTimeout(() => setFailed(), 2800);
  }

  setTimeout(() => setFailed(), 2400);
</script>
