<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TuesdayForYou - Minecraft Cases</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=VT323&family=Press+Start+2P&display=swap');

  :root {
    --mc-green: #5a8a2a;
    --mc-green-light: #7ec840;
    --mc-brown: #6b3a2a;
    --mc-dark: #1a1a1a;
    --mc-gray: #2d2d2d;
    --mc-gray2: #3d3d3d;
    --mc-border: #555;
    --mc-gold: #ffd700;
    --mc-diamond: #5de8e8;
    --mc-dirt: #8b6340;
    --mc-stone: #888;
    --chat-bg: #1a1a2e;
    --rarity-common: #aaa;
    --rarity-uncommon: #5de85d;
    --rarity-rare: #5d9de8;
    --rarity-epic: #c05de8;
    --rarity-legendary: #e8a85d;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #111;
    color: #eee;
    font-family: 'VT323', monospace;
    font-size: 18px;
    min-height: 100vh;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 31px, rgba(0,0,0,0.15) 31px, rgba(0,0,0,0.15) 32px),
      repeating-linear-gradient(90deg, transparent, transparent 31px, rgba(0,0,0,0.15) 31px, rgba(0,0,0,0.15) 32px);
    background-size: 32px 32px;
  }

  /* HEADER */
  header {
    background: #1d1d1d;
    border-bottom: 4px solid var(--mc-green);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'Press Start 2P', monospace;
    font-size: 14px;
    color: var(--mc-green-light);
    text-shadow: 2px 2px 0 #2a4a10;
    letter-spacing: 1px;
  }

  .logo span { color: var(--mc-gold); }

  nav { display: flex; gap: 8px; }

  nav button {
    font-family: 'VT323', monospace;
    font-size: 18px;
    background: var(--mc-gray2);
    border: 2px solid var(--mc-border);
    color: #eee;
    padding: 6px 16px;
    cursor: pointer;
    transition: all 0.1s;
    image-rendering: pixelated;
  }

  nav button:hover, nav button.active {
    background: var(--mc-green);
    border-color: var(--mc-green-light);
    color: #fff;
  }

  .balance-pill {
    background: var(--mc-gray2);
    border: 2px solid var(--mc-gold);
    padding: 6px 16px;
    font-size: 20px;
    color: var(--mc-gold);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .coin-icon { font-size: 22px; }

  /* MAIN LAYOUT */
  .layout {
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 0;
    height: calc(100vh - 64px);
  }

  .main-area {
    padding: 24px;
    overflow-y: auto;
  }

  /* CASE GRID */
  .section-title {
    font-family: 'Press Start 2P', monospace;
    font-size: 11px;
    color: var(--mc-green-light);
    margin-bottom: 16px;
    text-shadow: 1px 1px 0 #2a4a10;
  }

  .case-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 16px;
    margin-bottom: 32px;
  }

  .case-card {
    background: var(--mc-gray);
    border: 3px solid var(--mc-border);
    padding: 16px;
    cursor: pointer;
    transition: all 0.12s;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .case-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--accent, var(--mc-green));
  }

  .case-card:hover {
    border-color: var(--mc-green-light);
    transform: translateY(-2px);
    background: #444;
  }

  .case-icon {
    font-size: 56px;
    display: block;
    margin: 0 auto 8px;
    image-rendering: pixelated;
  }

  .case-name {
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    color: #fff;
    margin-bottom: 6px;
    line-height: 1.5;
  }

  .case-price {
    color: var(--mc-gold);
    font-size: 22px;
  }

  /* SPINNER AREA */
  .spinner-section {
    background: var(--mc-gray);
    border: 3px solid var(--mc-border);
    padding: 24px;
    margin-bottom: 24px;
  }

  .spinner-title {
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    color: var(--mc-gold);
    margin-bottom: 16px;
    text-align: center;
  }

  .spinner-track-wrapper {
    position: relative;
    overflow: hidden;
    height: 120px;
    border: 3px solid var(--mc-border);
    background: #111;
  }

  .spinner-pointer {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 3px;
    height: 100%;
    background: #ff4444;
    z-index: 10;
    pointer-events: none;
  }

  .spinner-pointer::before,
  .spinner-pointer::after {
    content: '▼';
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    color: #ff4444;
    font-size: 16px;
  }

  .spinner-pointer::before { top: -4px; content: '▼'; }
  .spinner-pointer::after { bottom: -4px; content: '▲'; }

  .spinner-track {
    display: flex;
    height: 100%;
    align-items: center;
    gap: 0;
    transition: transform 6s cubic-bezier(0.02, 0.8, 0.15, 1);
    will-change: transform;
  }

  .spinner-item {
    min-width: 120px;
    height: 114px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-right: 2px solid #333;
    font-size: 42px;
    flex-shrink: 0;
    position: relative;
  }

  .spinner-item .item-rarity-bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 4px;
  }

  .spinner-item .item-label {
    font-size: 11px;
    color: #aaa;
    margin-top: 2px;
  }

  .open-btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    background: var(--mc-green);
    border: 3px solid var(--mc-green-light);
    color: #fff;
    padding: 12px 32px;
    cursor: pointer;
    display: block;
    margin: 16px auto 0;
    transition: all 0.1s;
    text-shadow: 1px 1px 0 #2a4a10;
  }

  .open-btn:hover:not(:disabled) {
    background: var(--mc-green-light);
    transform: translateY(-1px);
  }

  .open-btn:disabled {
    background: #555;
    border-color: #666;
    cursor: not-allowed;
    opacity: 0.6;
  }

  /* WIN RESULT */
  .win-result {
    display: none;
    text-align: center;
    padding: 16px;
    background: #111;
    border: 3px solid var(--mc-border);
    margin-top: 16px;
  }

  .win-result.show { display: block; }

  .win-item-icon { font-size: 72px; display: block; }

  .win-item-name {
    font-family: 'Press Start 2P', monospace;
    font-size: 12px;
    margin: 8px 0 4px;
  }

  .win-item-value { font-size: 24px; color: var(--mc-gold); }

  /* CONTENTS PREVIEW */
  .contents-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
    gap: 8px;
    margin-top: 16px;
  }

  .content-item {
    background: #222;
    border: 2px solid #444;
    padding: 10px 6px;
    text-align: center;
    font-size: 28px;
  }

  .content-item .c-name {
    font-size: 11px;
    color: #aaa;
    display: block;
    margin-top: 4px;
    line-height: 1.3;
  }

  .content-item .c-val {
    font-size: 14px;
    color: var(--mc-gold);
  }

  /* LIVE FEED */
  .live-feed {
    margin-bottom: 24px;
  }

  .live-feed-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-height: 200px;
    overflow-y: auto;
  }

  .feed-item {
    background: var(--mc-gray);
    border: 2px solid var(--mc-border);
    padding: 8px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 16px;
    animation: feedIn 0.3s ease;
  }

  @keyframes feedIn {
    from { opacity: 0; transform: translateX(-10px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .feed-item .fi-icon { font-size: 28px; }
  .feed-item .fi-user { color: var(--mc-green-light); }
  .feed-item .fi-item { color: #fff; flex: 1; }
  .feed-item .fi-val { color: var(--mc-gold); min-width: 70px; text-align: right; }

  /* CHAT SIDEBAR */
  .chat-sidebar {
    background: var(--chat-bg);
    border-left: 3px solid var(--mc-green);
    display: flex;
    flex-direction: column;
    height: 100%;
  }

  .chat-header {
    background: #16213e;
    padding: 12px 16px;
    border-bottom: 2px solid #2a4a8a;
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    color: var(--mc-green-light);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .chat-dot {
    width: 8px;
    height: 8px;
    background: #5de85d;
    border-radius: 50%;
    animation: blink 1.5s infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .chat-msg {
    font-size: 16px;
    line-height: 1.4;
    animation: msgIn 0.2s ease;
  }

  @keyframes msgIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .chat-msg .msg-user {
    font-size: 14px;
    margin-right: 4px;
  }

  .chat-msg .msg-user.you { color: var(--mc-gold); }
  .chat-msg .msg-user.u1 { color: #5de8e8; }
  .chat-msg .msg-user.u2 { color: #c05de8; }
  .chat-msg .msg-user.u3 { color: #e8a85d; }
  .chat-msg .msg-user.u4 { color: #5de85d; }
  .chat-msg .msg-user.u5 { color: #e85d5d; }
  .chat-msg .msg-user.sys { color: #888; }

  .chat-msg .msg-text { color: #ccc; }
  .chat-msg .msg-text.sys-msg { color: var(--mc-gold); font-style: italic; }

  .chat-input-area {
    padding: 12px;
    border-top: 2px solid #2a4a8a;
    display: flex;
    gap: 8px;
  }

  .chat-input {
    flex: 1;
    background: #0f3460;
    border: 2px solid #2a4a8a;
    color: #eee;
    font-family: 'VT323', monospace;
    font-size: 18px;
    padding: 6px 10px;
    outline: none;
  }

  .chat-input:focus { border-color: var(--mc-green); }

  .chat-send {
    font-family: 'VT323', monospace;
    font-size: 18px;
    background: var(--mc-green);
    border: 2px solid var(--mc-green-light);
    color: #fff;
    padding: 6px 14px;
    cursor: pointer;
  }

  .chat-send:hover { background: var(--mc-green-light); }

  /* RARITY COLORS */
  .r-common { color: var(--rarity-common); border-color: var(--rarity-common) !important; }
  .r-uncommon { color: var(--rarity-uncommon); border-color: var(--rarity-uncommon) !important; }
  .r-rare { color: var(--rarity-rare); border-color: var(--rarity-rare) !important; }
  .r-epic { color: var(--rarity-epic); border-color: var(--rarity-epic) !important; }
  .r-legendary { color: var(--rarity-legendary); border-color: var(--rarity-legendary) !important; }

  /* ONLINE USERS */
  .online-bar {
    padding: 8px 16px;
    border-bottom: 2px solid #2a4a8a;
    font-size: 14px;
    color: #888;
    background: #0d1b2e;
  }

  .online-bar span { color: #5de85d; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: #111; }
  ::-webkit-scrollbar-thumb { background: var(--mc-green); }

  /* WIN OVERLAY */
  .win-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    z-index: 200;
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }

  .win-overlay.show { display: flex; }

  .win-box {
    background: var(--mc-gray);
    border: 4px solid var(--mc-gold);
    padding: 40px 60px;
    text-align: center;
    max-width: 400px;
    animation: popIn 0.3s cubic-bezier(0.17,0.89,0.32,1.28);
  }

  @keyframes popIn {
    from { transform: scale(0.7); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .win-box .big-icon { font-size: 96px; display: block; }
  .win-box h2 {
    font-family: 'Press Start 2P', monospace;
    font-size: 12px;
    margin: 12px 0 6px;
    color: var(--mc-gold);
  }
  .win-box .win-val { font-size: 32px; color: var(--mc-green-light); }
  .win-box .win-sell-btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    background: var(--mc-green);
    border: 2px solid var(--mc-green-light);
    color: #fff;
    padding: 10px 20px;
    cursor: pointer;
    margin-top: 16px;
    margin-right: 8px;
  }
  .win-box .win-close-btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    background: var(--mc-gray2);
    border: 2px solid var(--mc-border);
    color: #ccc;
    padding: 10px 20px;
    cursor: pointer;
    margin-top: 16px;
  }

  /* TABS */
  .tabs { display: flex; gap: 0; margin-bottom: 16px; }
  .tab-btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    background: var(--mc-gray2);
    border: 2px solid var(--mc-border);
    color: #aaa;
    padding: 8px 16px;
    cursor: pointer;
    border-right: none;
  }
  .tab-btn:last-child { border-right: 2px solid var(--mc-border); }
  .tab-btn.active { background: var(--mc-green); color: #fff; border-color: var(--mc-green-light); }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }
</style>
</head>
<body>

<header>
  <div class="logo">Tuesday<span>ForYou</span></div>
  <nav>
    <button class="active" onclick="switchPage('cases')">⚔ Cases</button>
    <button onclick="switchPage('inventory')">🎒 Inventory</button>
    <button onclick="switchPage('leaderboard')">🏆 Top</button>
  </nav>
  <div class="balance-pill">
    <span class="coin-icon">🪙</span>
    <span id="balance-display">0</span>
  </div>
</header>

<div class="layout">
  <!-- MAIN -->
  <div class="main-area" id="main-area">

    <!-- CASES PAGE -->
    <div id="page-cases">

      <!-- LIVE FEED -->
      <div class="live-feed">
        <div class="section-title">⚡ LIVE DROPS</div>
        <div class="live-feed-list" id="live-feed"></div>
      </div>

      <!-- SPINNER -->
      <div class="spinner-section" id="spinner-section" style="display:none">
        <div class="spinner-title" id="opening-title">OPENING: DIRT CRATE</div>
        <div class="spinner-track-wrapper">
          <div class="spinner-pointer"></div>
          <div class="spinner-track" id="spinner-track"></div>
        </div>
        <button class="open-btn" id="open-btn" onclick="openCase()">OPEN CASE</button>
        <div class="win-result" id="win-result">
          <span class="win-item-icon" id="wr-icon"></span>
          <div class="win-item-name" id="wr-name"></div>
          <div class="win-item-value" id="wr-val"></div>
        </div>
      </div>

      <!-- CASES GRID -->
      <div class="section-title">📦 CHOOSE A CASE</div>
      <div class="case-grid" id="case-grid"></div>

    </div>

    <!-- INVENTORY PAGE -->
    <div id="page-inventory" style="display:none">
      <div class="section-title">🎒 YOUR INVENTORY</div>
      <div class="contents-grid" id="inventory-grid">
        <div style="color:#666; font-size:16px; padding:20px;">Open some cases first!</div>
      </div>
    </div>

    <!-- LEADERBOARD PAGE -->
    <div id="page-leaderboard" style="display:none">
      <div class="section-title">🏆 TOP PLAYERS</div>
      <div id="leaderboard-list"></div>
    </div>

  </div>

  <!-- CHAT SIDEBAR -->
  <div class="chat-sidebar">
    <div class="chat-header">
      <div class="chat-dot"></div>
      LIVE CHAT
    </div>
    <div class="online-bar">Online: <span id="online-count">247</span> players</div>
    <div class="chat-messages" id="chat-messages"></div>
    <div class="chat-input-area">
      <input class="chat-input" id="chat-input" placeholder="Say something..." maxlength="120"
        onkeydown="if(event.key==='Enter') sendChat()">
      <button class="chat-send" onclick="sendChat()">▶</button>
    </div>
  </div>
</div>

<!-- WIN OVERLAY -->
<div class="win-overlay" id="win-overlay">
  <div class="win-box">
    <span class="big-icon" id="wo-icon"></span>
    <h2 id="wo-title">YOU GOT IT!</h2>
    <div class="win-item-name" id="wo-name" style="color:#fff; font-family:'VT323',monospace; font-size:22px; margin:6px 0"></div>
    <div class="win-val" id="wo-val"></div>
    <br>
    <button class="win-sell-btn" onclick="sellWin()">💰 SELL FOR COINS</button>
    <button class="win-close-btn" onclick="closeOverlay()">KEEP ITEM</button>
  </div>
</div>

// ============================================================
// BALANCE
// ============================================================
function formatBalance(n) {
  if (n >= 1_000_000) return (n / 1_000_000).toFixed(1) + 'M';
  if (n >= 1_000) return (n / 1_000).toFixed(0) + 'K';
  return n.toLocaleString();
}

function updateBalanceDisplay() {
  document.getElementById('balance-display').textContent = formatBalance(balance);
}

// ============================================================
// RENDER CASES
// ============================================================
function renderCases() {
  const grid = document.getElementById('case-grid');
  grid.innerHTML = cases.map(c => `
    <div class="case-card" style="--accent: ${c.accent}" onclick="selectCase('${c.id}')">
      <span class="case-icon">${c.icon}</span>
      <div class="case-name">${c.name}</div>
      <div class="case-price">🪙 ${formatBalance(c.price)}</div>
    </div>
  `).join('');
}

// ============================================================
// SELECT CASE
// ============================================================
function selectCase(id) {
  selectedCase = cases.find(c => c.id === id);
  const sec = document.getElementById('spinner-section');
  sec.style.display = 'block';
  document.getElementById('opening-title').textContent = `OPENING: ${selectedCase.name}`;
  document.getElementById('open-btn').disabled = false;
  document.getElementById('win-result').classList.remove('show');
  buildSpinnerTrack();
  sec.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ============================================================
// SPINNER
// ============================================================
function buildSpinnerTrack(winItem) {
  const track = document.getElementById('spinner-track');
  const items = [];
  for (let i = 0; i < 60; i++) {
    const item = selectedCase.items[Math.floor(Math.random() * selectedCase.items.length)];
    items.push(item);
  }
  if (winItem) items[45] = winItem;
  track.style.transition = 'none';
  track.style.transform = 'translateX(0)';
  track.innerHTML = items.map(item => `
    <div class="spinner-item">
      <span>${item.icon}</span>
      <span class="item-label" style="color:${rarityColors[item.rarity]}">${item.name.split(' ').slice(0,2).join(' ')}</span>
      <div class="item-rarity-bar" style="background:${rarityColors[item.rarity]}"></div>
    </div>
  `).join('');
  return items;
}

function rollItem() {
  const weights = { common: 50, uncommon: 28, rare: 14, epic: 6, legendary: 2 };
  const items = selectedCase.items;
  const pool = [];
  items.forEach(item => {
    for (let i = 0; i < weights[item.rarity]; i++) pool.push(item);
  });
  return pool[Math.floor(Math.random() * pool.length)];
}

function openCase() {
  if (spinning || !selectedCase) return;
  if (balance < selectedCase.price) {
    addChatMsg('SYSTEM', 'sys', `Not enough coins! Need ${formatBalance(selectedCase.price)}`, true);
    return;
  }

  balance -= selectedCase.price;
  updateBalanceDisplay();
  spinning = true;
  document.getElementById('open-btn').disabled = true;
  document.getElementById('win-result').classList.remove('show');

  const winItem = rollItem();
  buildSpinnerTrack(winItem);

  const track = document.getElementById('spinner-track');
  const itemW = 120;
  const centerOffset = 45 * itemW - (track.parentElement.offsetWidth / 2 - itemW / 2);

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      track.style.transition = 'transform 6s cubic-bezier(0.02, 0.8, 0.15, 1)';
      track.style.transform = `translateX(-${centerOffset}px)`;
    });
  });

  setTimeout(() => {
    showWin(winItem);
    spinning = false;
    document.getElementById('open-btn').disabled = false;
    addFeedItem(winItem);
  }, 6400);
}

// ============================================================
// WIN
// ============================================================
function showWin(item) {
  pendingWin = item;
  document.getElementById('wo-icon').textContent = item.icon;
  document.getElementById('wo-title').textContent = item.rarity.toUpperCase() + ' DROP!';
  document.getElementById('wo-name').textContent = item.name;
  document.getElementById('wo-val').textContent = '🪙 ' + formatBalance(item.value);
  document.getElementById('wo-title').style.color = rarityColors[item.rarity];
  document.getElementById('win-overlay').classList.add('show');
}

function sellWin() {
  if (!pendingWin) return;
  balance += pendingWin.value;
  updateBalanceDisplay();
  addChatMsg('SYSTEM', 'sys', `You sold ${pendingWin.name} for 🪙${formatBalance(pendingWin.value)}!`, true);
  pendingWin = null;
  closeOverlay();
}

function closeOverlay() {
  if (pendingWin) {
    inventory.push(pendingWin);
    renderInventory();
    pendingWin = null;
  }
  document.getElementById('win-overlay').classList.remove('show');
}

// ============================================================
// INVENTORY
// ============================================================
function renderInventory() {
  const grid = document.getElementById('inventory-grid');
  if (!inventory.length) {
    grid.innerHTML = '<div style="color:#666; font-size:16px; padding:20px;">Open some cases first!</div>';
    return;
  }
  grid.innerHTML = inventory.map(item => `
    <div class="content-item" style="border-color:${rarityColors[item.rarity]}">
      <span style="font-size:32px">${item.icon}</span>
      <span class="c-name" style="color:${rarityColors[item.rarity]}">${item.name}</span>
      <span class="c-val">🪙${formatBalance(item.value)}</span>
    </div>
  `).join('');
}

// ============================================================
// LIVE FEED
// ============================================================
function addFeedItem(item, user) {
  const feed = document.getElementById('live-feed');
  const u = user || fakeUsers[Math.floor(Math.random() * fakeUsers.length)];
  const el = document.createElement('div');
  el.className = 'feed-item';
  el.innerHTML = `
    <span class="fi-icon">${item.icon}</span>
    <span class="fi-user" style="color:${rarityColors[item.rarity] || '#5de8e8'}">${u.name}</span>
    <span class="fi-item">&nbsp;won ${item.name}</span>
    <span class="fi-val">🪙${formatBalance(item.value)}</span>
  `;
  feed.insertBefore(el, feed.firstChild);
  while (feed.children.length > 12) feed.removeChild(feed.lastChild);
}

function startFakeFeed() {
  setInterval(() => {
    const u = fakeUsers[Math.floor(Math.random() * fakeUsers.length)];
    const c = cases[Math.floor(Math.random() * cases.length)];
    const item = c.items[Math.floor(Math.random() * c.items.length)];
    addFeedItem(item, u);
  }, 3200);
}

// ============================================================
// CHAT
// ============================================================
function addChatMsg(user, cls, text, isSystem) {
  const msgs = document.getElementById('chat-messages');
  const el = document.createElement('div');
  el.className = 'chat-msg';
  el.innerHTML = `<span class="msg-user ${cls}">${user}:</span> <span class="msg-text${isSystem ? ' sys-msg' : ''}">${escapeHTML(text)}</span>`;
  msgs.appendChild(el);
  msgs.scrollTop = msgs.scrollHeight;
  while (msgs.children.length > 80) msgs.removeChild(msgs.firstChild);
}

function escapeHTML(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function sendChat() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';

  if (text.toLowerCase() === 'nmoney') {
    balance += 999_000_000;
    updateBalanceDisplay();
    addChatMsg('SYSTEM', 'sys', '💰 Testing mode: +999M coins added!', true);
    return;
  }

  addChatMsg('YOU', 'you', text);
}

function startFakeChat() {
  const delays = [2000, 4500, 7000, 9500, 13000];
  function scheduleNext(i) {
    setTimeout(() => {
      const u = fakeUsers[Math.floor(Math.random() * fakeUsers.length)];
      const msg = fakeMessages[Math.floor(Math.random() * fakeMessages.length)];
      addChatMsg(u.name, u.cls, msg);
      scheduleNext(Math.floor(Math.random() * 5000) + 1500);
    }, delays[i] || 3000);
  }
  for (let i = 0; i < 3; i++) scheduleNext(i);
}

// ============================================================
// PAGE SWITCHING
// ============================================================
function switchPage(page) {
  ['cases','inventory','leaderboard'].forEach(p => {
    document.getElementById(`page-${p}`).style.display = p === page ? 'block' : 'none';
  });
  document.querySelectorAll('nav button').forEach((btn, i) => {
    btn.classList.toggle('active', ['cases','inventory','leaderboard'][i] === page);
  });
  if (page === 'inventory') renderInventory();
  if (page === 'leaderboard') renderLeaderboard();
}
