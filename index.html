<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tuesday For You</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --cream: #f5ede0;
    --gold: #c9963a;
    --rust: #b5451b;
    --deep: #1a0f05;
    --mist: rgba(245, 237, 224, 0.07);
  }

  body {
    background: var(--deep);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-family: 'Cormorant Garamond', serif;
  }

  /* Ambient orbs */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0;
    animation: orbFloat 12s ease-in-out infinite;
  }
  .orb1 {
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(181,69,27,0.35) 0%, transparent 70%);
    top: -100px; left: -100px;
    animation-delay: 0s;
  }
  .orb2 {
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(201,150,58,0.2) 0%, transparent 70%);
    bottom: -150px; right: -150px;
    animation-delay: 3s;
  }
  .orb3 {
    width: 350px; height: 350px;
    background: radial-gradient(circle, rgba(181,69,27,0.18) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    animation-delay: 6s;
  }

  @keyframes orbFloat {
    0%   { opacity: 0; transform: scale(0.8) translate(0, 0); }
    25%  { opacity: 1; }
    50%  { transform: scale(1.1) translate(20px, -30px); }
    75%  { opacity: 0.7; }
    100% { opacity: 0; transform: scale(0.8) translate(0, 0); }
  }

  /* Floating particles */
  .particles {
    position: fixed; inset: 0; pointer-events: none;
  }
  .particle {
    position: absolute;
    width: 2px; height: 2px;
    background: var(--gold);
    border-radius: 50%;
    opacity: 0;
    animation: particleDrift linear infinite;
  }

  @keyframes particleDrift {
    0%   { opacity: 0; transform: translateY(100vh) scale(0); }
    10%  { opacity: 0.8; }
    90%  { opacity: 0.4; }
    100% { opacity: 0; transform: translateY(-10vh) scale(1.5); }
  }

  /* Horizontal scan line */
  .scanline {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(201,150,58,0.4), transparent);
    animation: scanDown 8s ease-in-out infinite;
    opacity: 0;
  }
  @keyframes scanDown {
    0%   { top: 0; opacity: 0; }
    5%   { opacity: 1; }
    95%  { opacity: 0.3; }
    100% { top: 100vh; opacity: 0; }
  }

  /* Center container */
  .center {
    text-align: center;
    position: relative;
    z-index: 10;
    padding: 2rem;
  }

  /* Day label */
  .day-label {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-style: italic;
    font-size: clamp(0.9rem, 2vw, 1.1rem);
    letter-spacing: 0.5em;
    color: var(--gold);
    text-transform: uppercase;
    opacity: 0;
    transform: translateY(20px);
    animation: fadeUp 1.2s ease forwards 0.4s;
    margin-bottom: 1.5rem;
  }

  /* Main title */
  .title {
    font-family: 'Playfair Display', serif;
    font-weight: 400;
    font-size: clamp(3.5rem, 10vw, 8rem);
    line-height: 1;
    color: var(--cream);
    opacity: 0;
    transform: translateY(30px) scale(0.96);
    animation: heroReveal 1.6s cubic-bezier(0.16, 1, 0.3, 1) forwards 0.8s;
    position: relative;
  }
  .title .word-tuesday {
    display: block;
    position: relative;
  }
  .title .word-for {
    display: block;
    font-style: italic;
    font-size: 0.55em;
    color: var(--gold);
    letter-spacing: 0.12em;
    margin: 0.2em 0;
  }
  .title .word-you {
    display: block;
  }

  /* Shimmer on "Tuesday" */
  .title .word-tuesday::after {
    content: 'Tuesday';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent 0%, rgba(201,150,58,0.6) 50%, transparent 100%);
    background-size: 200% 100%;
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    animation: shimmer 4s ease-in-out infinite 2.5s;
    opacity: 0;
    animation-fill-mode: forwards;
  }
  @keyframes shimmer {
    0%   { background-position: -200% 0; opacity: 0; }
    10%  { opacity: 1; }
    50%  { background-position: 200% 0; }
    60%  { opacity: 0; }
    100% { background-position: 200% 0; opacity: 0; }
  }

  /* Decorative line */
  .deco-line {
    width: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 2rem auto;
    animation: expandLine 1.4s ease forwards 2s;
  }
  @keyframes expandLine {
    to { width: 280px; }
  }

  /* Subtitle */
  .subtitle {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-style: italic;
    font-size: clamp(0.85rem, 2vw, 1rem);
    letter-spacing: 0.3em;
    color: rgba(245, 237, 224, 0.4);
    text-transform: uppercase;
    opacity: 0;
    transform: translateY(10px);
    animation: fadeUp 1s ease forwards 2.4s;
  }

  /* Breathing pulse ring */
  .ring {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    border: 1px solid rgba(201,150,58,0.15);
    opacity: 0;
    animation: ringPulse 5s ease-out infinite;
  }
  .ring:nth-child(1) { width: 340px; height: 340px; animation-delay: 2s; }
  .ring:nth-child(2) { width: 480px; height: 480px; animation-delay: 2.8s; }
  .ring:nth-child(3) { width: 620px; height: 620px; animation-delay: 3.6s; }
  @keyframes ringPulse {
    0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
    20%  { opacity: 0.6; }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
  }

  /* Keyframes shared */
  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes heroReveal {
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* Music note indicator */
  .music-indicator {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    display: flex;
    align-items: center;
    gap: 0.6rem;
    opacity: 0;
    animation: fadeUp 1s ease forwards 3s;
  }
  .music-label {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 0.8rem;
    letter-spacing: 0.2em;
    color: rgba(201,150,58,0.5);
  }
  .bars {
    display: flex;
    align-items: flex-end;
    gap: 3px;
    height: 18px;
  }
  .bar {
    width: 3px;
    background: var(--gold);
    opacity: 0.5;
    border-radius: 2px;
    animation: barBounce 0.8s ease-in-out infinite alternate;
  }
  .bar:nth-child(1) { height: 8px;  animation-delay: 0s; }
  .bar:nth-child(2) { height: 14px; animation-delay: 0.15s; }
  .bar:nth-child(3) { height: 10px; animation-delay: 0.3s; }
  .bar:nth-child(4) { height: 16px; animation-delay: 0.1s; }
  .bar:nth-child(5) { height: 7px;  animation-delay: 0.25s; }
  @keyframes barBounce {
    from { transform: scaleY(0.3); }
    to   { transform: scaleY(1); }
  }

  /* Hidden YouTube player */
  #yt-player { display: none; }
</style>
</head>
<body>

<!-- Ambient lighting -->
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<!-- Scan line -->
<div class="scanline"></div>

<!-- Floating particles -->
<div class="particles" id="particles"></div>

<!-- Pulse rings (behind text) -->
<div style="position:fixed;inset:0;pointer-events:none;z-index:5;">
  <div class="ring"></div>
  <div class="ring"></div>
  <div class="ring"></div>
</div>

<!-- Main content -->
<div class="center">
  <p class="day-label">every single week</p>
  <h1 class="title">
    <span class="word-tuesday">Tuesday</span>
    <span class="word-for">for</span>
    <span class="word-you">You</span>
  </h1>
  <div class="deco-line"></div>
  <p class="subtitle">always &nbsp;&bull;&nbsp; forever &nbsp;&bull;&nbsp; yours</p>
</div>

<!-- Music note indicator -->
<div class="music-indicator">
  <span class="music-label">now playing</span>
  <div class="bars">
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
  </div>
</div>

<!-- YouTube IFrame API -->
<div id="yt-player"></div>
<script>
  // Spawn particles
  const container = document.getElementById('particles');
  for (let i = 0; i < 55; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + 'vw';
    p.style.width = (Math.random() * 2 + 1) + 'px';
    p.style.height = p.style.width;
    p.style.animationDuration = (Math.random() * 18 + 10) + 's';
    p.style.animationDelay = (Math.random() * 15) + 's';
    p.style.opacity = Math.random() * 0.6;
    container.appendChild(p);
  }

  // YouTube autoplay
  var tag = document.createElement('script');
  tag.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(tag);

  function onYouTubeIframeAPIReady() {
    new YT.Player('yt-player', {
      height: '1',
      width: '1',
      videoId: 'eeuObHs01VM',
      playerVars: {
        autoplay: 1,
        loop: 1,
        playlist: 'eeuObHs01VM',
        controls: 0,
        mute: 0
      },
      events: {
        onReady: function(e) { e.target.playVideo(); }
      }
    });
  }
</script>
</body>
</html>
