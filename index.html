<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TuesdayForYou</title>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Inter', sans-serif;
    }

    #bg-video {
      position: fixed;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: 0;
      filter: brightness(0.4) grayscale(1);
    }

    .wash {
      position: fixed;
      inset: 0;
      z-index: 1;
      background: rgba(0,0,0,0.35);
      pointer-events: none;
    }

    /* ── ENTER SCREEN ── */
    #enter-screen {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #000;
      transition: opacity 1s ease, visibility 1s ease;
    }
    #enter-screen.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    .pre-name {
      font-family: 'EB Garamond', serif;
      font-size: clamp(2rem, 5vw, 3.8rem);
      color: #fff;
      letter-spacing: 0.04em;
      margin-bottom: 3rem;
    }
    .pre-name i { font-style: italic; color: #999; }

    #enter-btn {
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #fff;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.4);
      padding: 0.8rem 2.4rem;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    #enter-btn:hover { border-color: #fff; }

    /* ── WORDMARK — starts centered, animates to top-left ── */
    #wordmark {
      position: fixed;
      z-index: 2;
      font-family: 'EB Garamond', serif;
      font-size: clamp(2.6rem, 7vw, 6rem);
      font-weight: 400;
      color: #fff;
      letter-spacing: 0.06em;
      line-height: 1;
      white-space: nowrap;

      /* centered state */
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);

      opacity: 0;
      transition:
        opacity 2s ease,
        top 1s cubic-bezier(0.76, 0, 0.24, 1),
        left 1s cubic-bezier(0.76, 0, 0.24, 1),
        transform 1s cubic-bezier(0.76, 0, 0.24, 1),
        font-size 1s cubic-bezier(0.76, 0, 0.24, 1);

      pointer-events: none;
    }
    #wordmark i { font-style: italic; color: rgba(255,255,255,0.45); }
    #wordmark.visible { opacity: 1; }
    #wordmark.corner {
      top: 2rem;
      left: 2rem;
      transform: translate(0, 0);
      font-size: clamp(1rem, 2vw, 1.5rem);
    }

    /* ── ICONS ── */
    #icons {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 2;
      display: flex;
      gap: 2rem;
      opacity: 0;
      transition: opacity 0.8s ease;
      pointer-events: none;
    }
    #icons.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .icon-link {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.55rem;
      color: rgba(255,255,255,0.5);
      text-decoration: none;
      transition: color 0.2s;
    }
    .icon-link:hover { color: #fff; }
    .icon-link svg {
      width: 28px;
      height: 28px;
      fill: currentColor;
    }
    .icon-link span {
      font-size: 0.55rem;
      font-weight: 300;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    /* ── BOTTOM BAR ── */
    #bottom {
      position: fixed;
      bottom: 0;
      left: 0; right: 0;
      z-index: 3;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding: 0 2rem 1.8rem;
      opacity: 0;
      transition: opacity 1.5s ease 1s;
    }
    #bottom.visible { opacity: 1; }

    .date-label {
      font-size: 0.62rem;
      font-weight: 300;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
    }

    #mute-btn {
      background: transparent;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      color: rgba(255,255,255,0.35);
      font-family: 'Inter', sans-serif;
      font-size: 0.62rem;
      font-weight: 300;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    #mute-btn:hover { color: rgba(255,255,255,0.8); }

    .bars {
      display: flex;
      align-items: flex-end;
      gap: 2px;
      height: 12px;
    }
    .bars span {
      display: block;
      width: 2px;
      background: currentColor;
      border-radius: 1px;
      animation: pulse 1.4s ease-in-out infinite;
    }
    .bars span:nth-child(1) { height: 4px;  animation-delay: 0s; }
    .bars span:nth-child(2) { height: 9px;  animation-delay: 0.2s; }
    .bars span:nth-child(3) { height: 5px;  animation-delay: 0.4s; }
    .bars span:nth-child(4) { height: 12px; animation-delay: 0.1s; }
    .bars span:nth-child(5) { height: 6px;  animation-delay: 0.3s; }
    .bars.paused span { animation-play-state: paused; }

    @keyframes pulse {
      0%, 100% { transform: scaleY(1); }
      50%       { transform: scaleY(0.25); }
    }

    #yt-player {
      position: fixed;
      top: -9999px; left: -9999px;
      width: 1px; height: 1px;
    }
  </style>
</head>
<body>

  <!--
    BACKGROUND VIDEO
    Replace src with your own file: src="your-video.mp4"
  -->
  <video id="bg-video" autoplay muted loop playsinline
    src="https://www.w3schools.com/html/mov_bbb.mp4">
  </video>

  <div class="wash"></div>
  <div id="yt-player"></div>

  <!-- Enter -->
  <div id="enter-screen">
    <p class="pre-name">Tuesday<i>For</i>You</p>
    <button id="enter-btn">enter</button>
  </div>

  <!-- Wordmark (animates to corner) -->
  <h1 id="wordmark">Tuesday<i>For</i>You</h1>

  <!-- Icons (appear after wordmark moves) -->
  <div id="icons">

    <!-- Discord -->

    <a class="icon-link" href="#" target="_blank" rel="noopener">

      </svg>
      <span>instagram</span>
    </a>

    <!-- Placeholder icon 3 (add your link later) -->
    <a class="icon-link" href="#" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.746l7.73-8.835L1.254 2.25H8.08l4.253 5.622 5.911-5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
      </svg>
      <span>twitter</span>
    </a>

  </div>

  <!-- Bottom bar -->
  <div id="bottom">
    <span class="date-label" id="day-label"></span>
    <button id="mute-btn">
      <div class="bars" id="bars">
        <span></span><span></span><span></span><span></span><span></span>
      </div>
      <span id="mute-label">playing</span>
    </button>
  </div>

  <script>
    const days = ['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];
    document.getElementById('day-label').textContent = days[new Date().getDay()];

    let player = null;
    let muted = false;
    let hasEntered = false;

    const tag = document.createElement('script');
    tag.src = 'https://www.youtube.com/iframe_api';
    document.head.appendChild(tag);

    window.onYouTubeIframeAPIReady = function () {
      player = new YT.Player('yt-player', {
        videoId: 'ua47Omdl76s',
        playerVars: { autoplay: 0, controls: 0, loop: 1, playlist: 'ua47Omdl76s', rel: 0 },
        events: { onReady: function() {} }
      });
    };

    document.getElementById('enter-btn').addEventListener('click', function () {
      if (player && player.playVideo) {
        player.playVideo();
        player.setVolume(75);
      }

      document.getElementById('enter-screen').classList.add('hidden');

      const wm = document.getElementById('wordmark');
      const bottom = document.getElementById('bottom');

      // Fade in centered wordmark
      setTimeout(() => {
        wm.classList.add('visible');
        bottom.classList.add('visible');
      }, 200);

      // After 10s: animate wordmark to corner, fade in icons
      setTimeout(() => {
        wm.classList.add('corner');
        setTimeout(() => {
          document.getElementById('icons').classList.add('visible');
        }, 700); // icons appear as wordmark lands
      }, 10000);
    });

    document.getElementById('mute-btn').addEventListener('click', function () {
      if (!player) return;
      muted = !muted;
      muted ? player.mute() : player.unMute();
      document.getElementById('bars').classList.toggle('paused', muted);
      document.getElementById('mute-label').textContent = muted ? 'muted' : 'playing';
    });
  </script>
</body>
</html>
