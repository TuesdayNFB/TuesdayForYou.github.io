<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TuesdayForYou</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #fff;
      color: #111;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    @media (prefers-color-scheme: dark) {
      body { background: #111; color: #fff; }
      .player { border-color: #222; }
      .progress-track { background: #2a2a2a; }
      .ctrl svg { fill: #555; }
      .ctrl:hover { background: #1a1a1a; }
      .ctrl:hover svg { fill: #fff; }
      .ctrl.on svg { fill: #fff; }
      .play-btn { border-color: #333; }
      .play-btn svg { fill: #fff; }
      .play-btn:hover { background: #fff; border-color: #fff; }
      .play-btn:hover svg { fill: #111; }
      input[type=range] { background: linear-gradient(to right, #fff var(--fill,80%), #2a2a2a var(--fill,80%)); }
      input[type=range]::-webkit-slider-thumb { background: #fff; }
      input[type=range]::-moz-range-thumb { background: #fff; }
      .status-dot.on { background: #fff; }
      .verse-box { border-color: #1e1e1e; }
      .verse-text { color: #555; }
      .verse-ref { color: #3a3a3a; }
      .verse-btn:hover { color: #fff; }
      .progress-fill { background: #fff; }
      .progress-thumb { background: #fff; }
    }

    .page {
      width: 100%;
      max-width: 380px;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .top-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .brand {
      font-size: 20px;
      font-weight: 500;
      letter-spacing: -0.5px;
      flex-shrink: 0;
      padding-top: 2px;
    }

    .verse-box {
      border: 1px solid #ebebeb;
      border-radius: 10px;
      padding: 10px 12px;
      max-width: 170px;
    }
    .verse-text {
      font-size: 10px;
      line-height: 1.65;
      color: #999;
      font-style: italic;
      transition: opacity 0.25s;
    }
    .verse-ref {
      font-size: 9px;
      color: #ccc;
      margin-top: 5px;
      letter-spacing: 0.3px;
      transition: opacity 0.25s;
    }
    .verse-btn {
      display: block;
      margin-top: 7px;
      background: none;
      border: none;
      font-size: 9px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #ccc;
      cursor: pointer;
      padding: 0;
      font-family: 'Inter', sans-serif;
      transition: color 0.2s;
    }
    .verse-btn:hover { color: #111; }

    .player {
      width: 100%;
      border: 1px solid #e8e8e8;
      border-radius: 14px;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .track-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .track-name {
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .status-pill {
      display: flex; align-items: center; gap: 5px;
      flex-shrink: 0;
    }
    .status-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: #ddd;
      transition: background 0.3s;
    }
    .status-dot.on { background: #111; }
    .status-text {
      font-size: 10px;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: #bbb;
    }

    .vis-wrap { display: flex; justify-content: center; }
    #visualizer { display: block; }

    .progress-track {
      width: 100%; height: 2px;
      background: #ebebeb;
      border-radius: 99px;
      position: relative;
      cursor: pointer;
    }
    .progress-fill {
      height: 100%; width: 0%;
      background: #111;
      border-radius: 99px;
      transition: width 0.1s linear;
      pointer-events: none;
    }
    .progress-thumb {
      position: absolute; top: 50%; left: 0;
      width: 9px; height: 9px;
      border-radius: 50%;
      background: #111;
      transform: translate(-50%, -50%);
      pointer-events: none; opacity: 0;
      transition: opacity 0.2s;
    }
    .progress-track:hover .progress-thumb { opacity: 1; }

    .time-row {
      display: flex; justify-content: space-between;
      margin-top: -6px;
    }
    .t { font-size: 10px; color: #bbb; font-variant-numeric: tabular-nums; }

    .controls {
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .ctrl {
      background: none; border: none; cursor: pointer;
      padding: 7px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .ctrl:hover { background: #f4f4f4; }
    .ctrl svg { width: 16px; height: 16px; fill: #bbb; transition: fill 0.15s; }
    .ctrl:hover svg { fill: #111; }
    .ctrl.on svg { fill: #111; }

    .play-btn {
      width: 38px; height: 38px;
      border-radius: 50%;
      border: 1px solid #ccc;
      background: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, border-color 0.15s;
    }
    .play-btn:hover { background: #111; border-color: #111; }
    .play-btn:hover svg { fill: #fff; }
    .play-btn svg { width: 15px; height: 15px; fill: #111; transition: fill 0.15s; }

    .vol-row {
      display: flex; align-items: center; gap: 8px;
    }
    .vol-icon { width: 12px; height: 12px; fill: #bbb; flex-shrink: 0; }
    input[type=range] {
      flex: 1; -webkit-appearance: none; appearance: none;
      height: 2px;
      background: linear-gradient(to right, #111 var(--fill,80%), #ebebeb var(--fill,80%));
      border-radius: 99px; outline: none; cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 11px; height: 11px;
      border-radius: 50%; background: #111; cursor: pointer;
    }
    input[type=range]::-moz-range-thumb {
      width: 11px; height: 11px;
      border-radius: 50%; background: #111; border: none; cursor: pointer;
    }
    .vol-pct { font-size: 10px; color: #bbb; min-width: 26px; text-align: right; }

    .no-track {
      font-size: 11px; color: #bbb; text-align: center;
      line-height: 1.6; display: none;
    }
  </style>
</head>
<body>
<div class="page">

  <div class="top-row">
    <div class="brand">TuesdayForYou</div>
    <div class="verse-box">
      <div class="verse-text" id="verseText"></div>
      <div class="verse-ref" id="verseRef"></div>
      <button class="verse-btn" onclick="loadVerse()">↻ new verse</button>
    </div>
  </div>

  <div class="player">
    <div class="track-row">
      <div class="track-name" id="trackName">—</div>
      <div class="status-pill">
        <div class="status-dot" id="statusDot"></div>
        <span class="status-text" id="statusText">Ready</span>
      </div>
    </div>

    <div class="vis-wrap">
      <canvas id="visualizer" width="120" height="52"></canvas>
    </div>

    <div>
      <div class="progress-track" id="progressBar">
        <div class="progress-fill" id="progressFill"></div>
        <div class="progress-thumb"></div>
      </div>
      <div class="time-row">
        <span class="t" id="curTime">0:00</span>
        <span class="t" id="durTime">0:00</span>
      </div>
    </div>

    <div class="controls">
      <button class="ctrl" id="btnLoop" title="Loop" onclick="toggleLoop()">
        <svg viewBox="0 0 24 24"><path d="M17 17H7V14L3 18l4 4v-3h12v-6h-2v4zM7 7h10v3l4-4-4-4v3H5v6h2V7z"/></svg>
      </button>
      <button class="play-btn" onclick="togglePlay()">
        <svg id="iconPlay" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        <svg id="iconPause" viewBox="0 0 24 24" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
      </button>
      <button class="ctrl" onclick="toggleMute()">
        <svg id="iconVol" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
        <svg id="iconMute" viewBox="0 0 24 24" style="display:none"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
      </button>
    </div>

    <div class="vol-row">
      <svg class="vol-icon" viewBox="0 0 24 24"><path d="M5 9v6h4l5 5V4L9 9H5z"/></svg>
      <input type="range" id="volSlider" min="0" max="1" step="0.01" value="0.8" oninput="setVolume(this.value)"/>
      <span class="vol-pct" id="volPct">80%</span>
    </div>

    <div class="no-track" id="noTrack">
      Place <strong>Pass Out (Slowed).mp3</strong> in the same folder as this file.
    </div>
  </div>

</div>

<audio id="audioEl" preload="auto"></audio>

<script>
  const verses = [
    { text: "How great you are — there is no one like you.", ref: "2 Samuel 7:22" },
    { text: "I can do all this through him who gives me strength.", ref: "Philippians 4:13" },
    { text: "For God so loved the world that he gave his one and only Son.", ref: "John 3:16" },
    { text: "Trust in the Lord with all your heart.", ref: "Proverbs 3:5" },
    { text: "The Lord is my shepherd, I lack nothing.", ref: "Psalm 23:1" },
    { text: "Do not be afraid, for the Lord your God will be with you.", ref: "Joshua 1:9" },
    { text: "In all things God works for the good of those who love him.", ref: "Romans 8:28" },
    { text: "Those who hope in the Lord will renew their strength.", ref: "Isaiah 40:31" },
    { text: "Give thanks to the Lord, for he is good.", ref: "Psalm 107:1" },
    { text: "I know the plans I have for you — plans to give you hope and a future.", ref: "Jeremiah 29:11" },
  ];

  let lastIdx = -1;
  function loadVerse() {
    let idx;
    do { idx = Math.floor(Math.random() * verses.length); } while (idx === lastIdx && verses.length > 1);
    lastIdx = idx;
    const v = verses[idx];
    const t = document.getElementById('verseText');
    const r = document.getElementById('verseRef');
    t.style.opacity = 0; r.style.opacity = 0;
    setTimeout(() => {
      t.textContent = v.text;
      r.textContent = v.ref;
      t.style.opacity = 1; r.style.opacity = 1;
    }, 180);
  }
  loadVerse();

  const audio = document.getElementById('audioEl');
  let audioCtx, analyser, source, dataArr;
  let isLooping = false, isMuted = false;

  function initAudio() {
    audio.src = 'Pass Out (Slowed).mp3';
    document.getElementById('trackName').textContent = 'Pass Out (Slowed)';
    audio.addEventListener('canplay', () => {
      setupVis();
      audio.volume = 0.8;
      audio.play().catch(() => setStatus('Click play'));
    });
    audio.addEventListener('play', onPlay);
    audio.addEventListener('pause', onPause);
    audio.addEventListener('ended', onEnded);
    audio.addEventListener('timeupdate', updateProgress);
    audio.addEventListener('error', () => {
      setStatus('No track');
      document.getElementById('trackName').textContent = 'No track found';
      document.getElementById('noTrack').style.display = 'block';
    });
  }

  function setupVis() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 128;
    source = audioCtx.createMediaElementSource(audio);
    source.connect(analyser);
    analyser.connect(audioCtx.destination);
    dataArr = new Uint8Array(analyser.frequencyBinCount);
  }

  const canvas = document.getElementById('visualizer');
  const ctx = canvas.getContext('2d');
  const dark = () => window.matchMedia('(prefers-color-scheme: dark)').matches;

  function drawLoop() {
    requestAnimationFrame(drawLoop);
    ctx.clearRect(0, 0, 120, 52);
    const bars = 24, bw = 3, gap = 2;
    const totalW = bars * (bw + gap) - gap;
    const startX = (120 - totalW) / 2;
    const col = dark() ? '255,255,255' : '0,0,0';
    for (let i = 0; i < bars; i++) {
      let val = 0;
      if (analyser) {
        analyser.getByteFrequencyData(dataArr);
        val = dataArr[Math.floor(i * dataArr.length / bars)] / 255;
      }
      const h = Math.max(2, val * 44);
      const x = startX + i * (bw + gap);
      ctx.fillStyle = 'rgba(' + col + ',' + (analyser ? (0.15 + val * 0.85) : 0.08) + ')';
      ctx.beginPath();
      ctx.roundRect(x, 52 - h, bw, h, 1);
      ctx.fill();
    }
  }
  drawLoop();

  function togglePlay() {
    if (!audioCtx) setupVis();
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    if (audio.paused) audio.play(); else audio.pause();
  }
  function toggleLoop() {
    isLooping = !isLooping;
    audio.loop = isLooping;
    document.getElementById('btnLoop').classList.toggle('on', isLooping);
  }
  function toggleMute() {
    isMuted = !isMuted;
    audio.muted = isMuted;
    document.getElementById('iconVol').style.display = isMuted ? 'none' : '';
    document.getElementById('iconMute').style.display = isMuted ? '' : 'none';
  }
  function setVolume(v) {
    audio.volume = parseFloat(v);
    document.getElementById('volPct').textContent = Math.round(v * 100) + '%';
    document.getElementById('volSlider').style.setProperty('--fill', (v * 100) + '%');
  }
  document.getElementById('volSlider').style.setProperty('--fill', '80%');

  function setStatus(t) { document.getElementById('statusText').textContent = t; }
  function onPlay() {
    document.getElementById('iconPlay').style.display = 'none';
    document.getElementById('iconPause').style.display = '';
    document.getElementById('statusDot').classList.add('on');
    setStatus('Playing');
  }
  function onPause() {
    document.getElementById('iconPlay').style.display = '';
    document.getElementById('iconPause').style.display = 'none';
    document.getElementById('statusDot').classList.remove('on');
    setStatus('Paused');
  }
  function onEnded() {
    document.getElementById('statusDot').classList.remove('on');
    setStatus('Ended');
    document.getElementById('iconPlay').style.display = '';
    document.getElementById('iconPause').style.display = 'none';
  }
  function updateProgress() {
    const cur = audio.currentTime, dur = audio.duration || 0;
    const pct = dur ? (cur / dur) * 100 : 0;
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('curTime').textContent = fmt(cur);
    document.getElementById('durTime').textContent = fmt(dur);
  }
  function fmt(s) {
    if (!s || isNaN(s)) return '0:00';
    return Math.floor(s / 60) + ':' + String(Math.floor(s % 60)).padStart(2, '0');
  }
  document.getElementById('progressBar').addEventListener('click', e => {
    const r = e.currentTarget.getBoundingClientRect();
    audio.currentTime = ((e.clientX - r.left) / r.width) * (audio.duration || 0);
  });

  initAudio();
</script>
</body>
</html>
