<html lang="en">
<head>

  <title>TuesdayForYou</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Jost:wght@200;300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background-color: #faf7f2;
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      color: #2c2520;
    }

    nav {
      display: flex;
      align-items: center;
      padding: 1.4rem 2.5rem;
      border-bottom: 1px solid #e8e0d6;
    }

    .wordmark {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 1.5rem;
      letter-spacing: 0.01em;
      color: #2c2520;
      text-decoration: none;
    }

    .wordmark em {
      font-style: italic;
      color: #8c6a50;
    }

    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 3rem 2.5rem;
    }

    .section-label {
      font-family: 'Jost', sans-serif;
      font-weight: 200;
      font-size: 10px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #b8a898;
      margin-bottom: 1.5rem;
    }

    .file-list {
      display: flex;
      flex-direction: column;
      gap: 1px;
      background: #e8e0d6;
      border: 1px solid #e8e0d6;
      border-radius: 10px;
      overflow: hidden;
    }

    .file-card {
      display: flex;
      align-items: center;
      gap: 1.25rem;
      padding: 1rem 1.4rem;
      background: #faf7f2;
      transition: background 0.15s;
    }

    .file-card:hover { background: #f3ede5; }

    .file-icon {
      width: 38px;
      height: 38px;
      border-radius: 8px;
      background: #f0e8dd;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .file-icon svg {
      width: 18px;
      height: 18px;
      stroke: #8c6a50;
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .file-info { flex: 1; min-width: 0; }

    .file-name {
      font-size: 0.9rem;
      font-weight: 300;
      color: #2c2520;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .file-meta {
      font-size: 0.75rem;
      color: #b8a898;
      margin-top: 2px;
      font-weight: 200;
    }

    .dl-btn {
      font-family: 'Jost', sans-serif;
      font-size: 0.72rem;
      font-weight: 200;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #8c6a50;
      border: 1px solid #c9b8a8;
      border-radius: 20px;
      padding: 5px 14px;
      cursor: pointer;
      background: transparent;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .dl-btn:hover {
      background: #8c6a50;
      color: #faf7f2;
      border-color: #8c6a50;
    }

    footer {
      text-align: center;
      padding: 3rem 1rem;
      font-size: 0.72rem;
      color: #c9b8a8;
      font-weight: 200;
      letter-spacing: 0.1em;
    }
  </style>
</head>

    function b64ToBlob(b64) {
      const bin = atob(b64.replace(/\s/g, ''));
      const buf = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) buf[i] = bin.charCodeAt(i);
      return new Blob([buf], { type: 'application/octet-stream' });
    }

    Object.keys(FILES).forEach(id => {
      const btn = document.getElementById(id);
      if (!btn) return;
      btn.addEventListener('click', () => {
        const f = FILES[id];
        const url = URL.createObjectURL(b64ToBlob(f.b64));
        const a = document.createElement('a');
        a.href = url; a.download = f.name; a.click();
        URL.revokeObjectURL(url);
      });
