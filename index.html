<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TuesdayForYou</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #faf7f2;
      font-family: 'Cormorant Garamond', serif;
      overflow: hidden;
    }

    .grain {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
      opacity: 0.035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 200px 200px;
    }

    .center {
      text-align: center;
      position: relative;
      animation: fadeIn 1.6s ease both;
    }

    .eyebrow {
      font-family: 'Jost', sans-serif;
      font-weight: 200;
      font-size: 11px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: #b8a898;
      margin-bottom: 2rem;
      animation: slideUp 1.6s ease both;
    }

    .wordmark {
      font-size: clamp(3.5rem, 9vw, 7rem);
      font-weight: 300;
      color: #2c2520;
      line-height: 1;
      letter-spacing: -0.01em;
      animation: slideUp 1.4s ease both;
    }

    .wordmark em {
      font-style: italic;
      color: #8c6a50;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: #c9b8a8;
      margin: 2.2rem auto;
      animation: grow 1.8s ease both;
    }

    .tagline {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: clamp(1.1rem, 2.5vw, 1.45rem);
      color: #9a8878;
      letter-spacing: 0.02em;
      animation: slideUp 1.8s ease both;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes grow {
      from { width: 0; opacity: 0; }
      to   { width: 40px; opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="grain"></div>
  <div class="center">
    <p class="eyebrow">welcome</p>
    <h1 class="wordmark">Tuesday<em>ForYou</em></h1>
    <div class="divider"></div>
    <p class="tagline">something good, just for you</p>
  </div>
</body>
</html>
