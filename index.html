<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TuesdayForYou</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --card: #111111;
      --border: #1f1f1f;
      --border2: #2a2a2a;
      --text: #ffffff;
      --muted: #555555;
      --sub: #888888;
      --green: #1DB954;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      opacity: 0.025;
      pointer-events: none;
      z-index: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    .page {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 600px;
      padding: 56px 24px 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .logo {
      font-family: 'Orbitron', monospace;
      font-size: clamp(28px, 7vw, 46px);
      font-weight: 900;
      letter-spacing: 1px;
      text-align: center;
      color: #fff;
      margin-bottom: 8px;
      line-height: 1;
    }
    .logo-sub {
      font-size: 10px;
      letter-spacing: 5px;
      color: var(--muted);
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 30px;
    }

    .socials {
      display: flex;
      gap: 14px;
      margin-bottom: 36px;
    }
    .social-btn {
      width: 38px; height: 38px;
      border-radius: 50%;
      border: 1px solid var(--border2);
      background: transparent;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      text-decoration: none;
    }
    .social-btn:hover { border-color: #444; background: #1a1a1a; }
    .social-btn svg { width: 17px; height: 17px; fill: var(--sub); }

    .cards {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 28px 28px 24px;
    }
    .card-title {
      font-family: 'Orbitron', monospace;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2px;
      color: #fff;
      text-align: center;
      margin-bottom: 20px;
      text-transform: uppercase;
    }
    .verse-text {
      font-size: 15px;
      line-height: 1.8;
      color: #bbb;
      font-style: italic;
      text-align: center;
      margin-bottom: 16px;
      transition: opacity 0.4s;
    }
    .verse-ref {
      font-size: 11px;
      letter-spacing: 1.5px;
      color: var(--muted);
      text-align: center;
      transition: opacity 0.4s;
    }

    .reload-btn {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      color: var(--sub);
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      letter-spacing: 0.5px;
      padding: 18px;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .reload-btn:hover { border-color: #333; color: #fff; background: #161616; }
    .reload-btn svg { width: 13px; height: 13px; fill: currentColor; opacity: 0.6; }

    .player-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }
    .player-top {
      padding: 18px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .player-label {
      font-family: 'Orbitron', monospace;
      font-size: 9px;
      letter-spacing: 3px;
      color: var(--muted);
      text-transform: uppercase;
    }
    .status-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
      letter-spacing: 1.5px;
      color: var(--muted);
      text-transform: uppercase;
    }
    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--border2);
      transition: background 0.3s, box-shadow 0.3s;
    }
    .status-dot.playing {
      background: var(--green);
      box-shadow: 0 0 8px #1DB95466;
    }

    .player-body {
      padding: 24px 24px 26px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .vis-wrap {
      display: flex;
      justify-content: center;
    }
    #visualizer { border-radius: 50%; display: block; }

    .track-info { text-align: center; }
    .track-name {
      font-family: 'Orbitron', monospace;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 1px;
      color: #fff;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .track-meta { font-size: 11px; color: var(--muted); letter-spacing: 1px; }

    .progress-wrap { display: flex; align-items: center; gap: 10px; }
    .time-label {
      font-size: 11px;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      min-width: 30px;
      letter-spacing: 0.5px;
    }
    .time-label:last-child { text-align: right; }
    .progress-bar {
      flex: 1; height: 3px;
      background: var(--border2);
      border-radius: 99px;
      position: relative;
      cursor: pointer;
    }
    .progress-fill {
      height: 100%; background: #fff;
      border-radius: 99px; width: 0%;
      transition: width 0.1s linear;
      pointer-events: none;
    }
    .progress-thumb {
      position: absolute; top: 50%; left: 0%;
      transform: translate(-50%, -50%);
      width: 10px; height: 10px;
      border-radius: 50%; background: #fff;
      pointer-events: none; opacity: 0;
      transition: opacity 0.2s;
    }
    .progress-bar:hover .progress-thumb { opacity: 1; }

    .controls {
      display: flex; align-items: center;
      justify-content: center; gap: 20px;
    }
    .ctrl-btn {
      background: transparent; border: none;
      cursor: pointer; padding: 6px;
      border-radius: 50%; display: flex;
      align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .ctrl-btn:hover { background: #1e1e1e; }
    .ctrl-btn svg { width: 20px; height: 20px; fill: var(--sub); transition: fill 0.15s; }
    .ctrl-btn:hover svg { fill: #fff; }
    .ctrl-btn.active svg { fill: #fff; }
    .ctrl-btn.big {
      width: 52px; height: 52px;
      border: 1px solid var(--border2);
      border-radius: 50%;
    }
    .ctrl-btn.big:hover { border-color: #444; background: #1a1a1a; }
    .ctrl-btn.big svg { width: 22px; height: 22px; fill: #fff; }

    .vol-wrap { display: flex; align-items: center; gap: 10px; }
    .vol-label { font-size: 10px; letter-spacing: 2px; color: var(--muted); min-width: 24px; }
    .vol-pct { font-size: 10px; color: var(--muted); min-width: 30px; text-align: right; }
    input[type=range] {
      flex: 1; -webkit-appearance: none; appearance: none;
      height: 3px;
      background: linear-gradient(to right, #fff var(--fill, 80%), var(--border2) var(--fill, 80%));
      border-radius: 99px; outline: none; cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px; height: 12px;
      border-radius: 50%; background: #fff; cursor: pointer;
    }
    input[type=range]::-moz-range-thumb {
      width: 12px; height: 12px;
      border-radius: 50%; background: #fff; border: none; cursor: pointer;
    }

    .error-hint {
      font-size: 11px; color: var(--muted);
      text-align: center; letter-spacing: 0.5px; line-height: 1.7;
    }
  </style>
</head>
<body>
<div class="page">

  <div class="logo">TuesdayForYou</div>
  <div class="logo-sub">Music</div>

  <div class="socials">
    <a class="social-btn" href="#" target="_blank" rel="noopener" title="YouTube">
      <svg viewBox="0 0 24 24"><path d="M21.8 8s-.2-1.4-.8-2c-.8-.8-1.6-.8-2-.9C16.2 5 12 5 12 5s-4.2 0-7 .1c-.4.1-1.2.1-2 .9-.6.6-.8 2-.8 2S2 9.6 2 11.2v1.5c0 1.6.2 3.2.2 3.2s.2 1.4.8 2c.8.8 1.8.8 2.2.8C6.6 19 12 19 12 19s4.2 0 7-.2c.4-.1 1.2-.1 2-.9.6-.6.8-2 .8-2s.2-1.6.2-3.2v-1.5C22 9.6 21.8 8 21.8 8zM9.7 14.5V9l5.4 2.8-5.4 2.7z"/></svg>
    </a>
    <a class="social-btn" href="#" target="_blank" rel="noopener" title="Spotify">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.6 14.4c-.2.3-.6.4-.9.2-2.5-1.5-5.6-1.9-9.3-1-.3.1-.7-.1-.8-.5-.1-.3.1-.7.5-.8 4-.9 7.5-.5 10.3 1.2.3.2.4.6.2.9zm1.2-2.8c-.2.4-.7.5-1.1.3-2.8-1.7-7.1-2.2-10.5-1.2-.4.1-.9-.1-1-.5-.1-.4.1-.9.5-1 3.8-1.1 8.5-.6 11.7 1.3.4.2.5.7.4 1.1zm.1-2.9c-3.4-2-8.9-2.2-12.1-1.2-.5.1-1-.2-1.1-.7-.1-.5.2-1 .7-1.1 3.7-1.1 9.8-.9 13.7 1.4.4.3.6.8.3 1.3-.3.4-.9.6-1.5.3z"/></svg>
    </a>
  </div>

  <div class="cards">

    <div class="card">
      <div class="card-title">Verse of the Day</div>
      <div class="verse-text" id="verseText"></div>
      <div class="verse-ref" id="verseRef"></div>
    </div>

    <button class="reload-btn" onclick="loadVerse()">
      <svg viewBox="0 0 24 24"><path d="M17.65 6.35A7.96 7.96 0 0 0 12 4c-4.42 0-8 3.58-8 8s3.58 8 8 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0 1 12 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
      New verse of the day
    </button>

    <div class="player-card">
      <div class="player-top">
        <span class="player-label">Now Playing</span>
        <div class="status-pill">
          <div class="status-dot" id="statusDot"></div>
          <span id="statusText">Ready</span>
        </div>
      </div>
      <div class="player-body">
        <div class="vis-wrap">
          <canvas id="visualizer" width="160" height="160"></canvas>
        </div>
        <div class="track-info">
          <div class="track-name" id="trackName">—</div>
          <div class="track-meta">TUESDAYFORYOU</div>
        </div>
        <div class="progress-wrap">
          <span class="time-label" id="curTime">0:00</span>
          <div class="progress-bar" id="progressBar">
            <div class="progress-fill" id="progressFill"></div>
            <div class="progress-thumb" id="progressThumb"></div>
          </div>
          <span class="time-label" id="durTime">0:00</span>
        </div>
        <div class="controls">
          <button class="ctrl-btn" id="btnLoop" title="Loop" onclick="toggleLoop()">
            <svg viewBox="0 0 24 24"><path d="M17 17H7V14L3 18l4 4v-3h12v-6h-2v4zM7 7h10v3l4-4-4-4v3H5v6h2V7z"/></svg>
          </button>
          <button class="ctrl-btn big" onclick="togglePlay()">
            <svg id="iconPlay" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            <svg id="iconPause" viewBox="0 0 24 24" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
          </button>
          <button class="ctrl-btn" title="Mute" onclick="toggleMute()">
            <svg id="iconVol" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
            <svg id="iconMute" viewBox="0 0 24 24" style="display:none"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
          </button>
        </div>
        <div class="vol-wrap">
          <span class="vol-label">VOL</span>
          <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.8" oninput="setVolume(this.value)"/>
          <span class="vol-pct" id="volPct">80%</span>
        </div>
        <div class="error-hint" id="errorHint" style="display:none">
          Add your MP3 to a <strong>Songs/</strong> folder and list it in <strong>songs-manifest.json</strong>
        </div>
      </div>
    </div>

  </div>
</div>

<audio id="audioEl" preload="auto"></audio>

<script>
  const verses = [
    { text: "How great you are, Sovereign Lord! There is no one like you, and there is no God but you, as we have heard with our own ears.", ref: "2 Samuel 7:22" },
    { text: "I can do all this through him who gives me strength.", ref: "Philippians 4:13" },
    { text: "For God so loved the world that he gave his one and only Son, that whoever believes in him shall not perish but have eternal life.", ref: "John 3:16" },
    { text: "Trust in the Lord with all your heart and lean not on your own understanding.", ref: "Proverbs 3:5" },
    { text: "The Lord is my shepherd, I lack nothing.", ref: "Psalm 23:1" },
    { text: "Be strong and courageous. Do not be afraid; do not be discouraged, for the Lord your God will be with you wherever you go.", ref: "Joshua 1:9" },
    { text: "And we know that in all things God works for the good of those who love him, who have been called according to his purpose.", ref: "Romans 8:28" },
    { text: "But those who hope in the Lord will renew their strength. They will soar on wings like eagles.", ref: "Isaiah 40:31" },
    { text: "Give thanks to the Lord, for he is good; his love endures forever.", ref: "Psalm 107:1" },
    { text: "For I know the plans I have for you, declares the Lord, plans to prosper you and not to harm you, plans to give you hope and a future.", ref: "Jeremiah 29:11" },
  ];

  let lastIdx = -1;
  function loadVerse() {
    let idx;
    do { idx = Math.floor(Math.random() * verses.length); } while (idx === lastIdx && verses.length > 1);
    lastIdx = idx;
    const v = verses[idx];
    const t = document.getElementById('verseText');
    const r = document.getElementById('verseRef');
    t.style.opacity = 0; r.style.opacity = 0;
    setTimeout(() => {
      t.textContent = '\u201c' + v.text + '\u201d';
      r.textContent = v.ref;
      t.style.opacity = 1; r.style.opacity = 1;
    }, 200);
  }
  loadVerse();

  const audio = document.getElementById('audioEl');
  let audioCtx, analyser, source, dataArr;
  let isLooping = false, isMuted = false;

  async function initAudio() {
    let src = null, name = null;
    try {
      const res = await fetch('songs-manifest.json');
      if (res.ok) {
        const manifest = await res.json();
        if (manifest.songs && manifest.songs.length > 0) {
          src = 'Songs/' + manifest.songs[0].file;
          name = manifest.songs[0].name;
        }
      }
    } catch(e) {}

    if (!src) { src = 'Songs/track.mp3'; name = null; }

    audio.src = src;
    document.getElementById('trackName').textContent = name
      ? name.toUpperCase()
      : src.split('/').pop().replace(/\.mp3$/i,'').toUpperCase();

    audio.addEventListener('canplay', () => {
      setupVisualizer();
      audio.volume = 0.8;
      audio.play().catch(() => setStatus('Click play'));
    });
    audio.addEventListener('play', onPlay);
    audio.addEventListener('pause', onPause);
    audio.addEventListener('ended', onEnded);
    audio.addEventListener('timeupdate', updateProgress);
    audio.addEventListener('error', () => {
      setStatus('No track');
      document.getElementById('trackName').textContent = 'NO TRACK FOUND';
      document.getElementById('errorHint').style.display = 'block';
    });
  }

  function setupVisualizer() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    source = audioCtx.createMediaElementSource(audio);
    source.connect(analyser);
    analyser.connect(audioCtx.destination);
    dataArr = new Uint8Array(analyser.frequencyBinCount);
    drawVisualizer();
  }

  const vCanvas = document.getElementById('visualizer');
  const vCtx = vCanvas.getContext('2d');

  function drawVisualizer() {
    requestAnimationFrame(drawVisualizer);
    vCtx.clearRect(0, 0, 160, 160);
    const cx = 80, cy = 80, innerR = 36;

    if (analyser) {
      analyser.getByteFrequencyData(dataArr);
      const bars = dataArr.length;
      for (let i = 0; i < bars; i++) {
        const angle = (i / bars) * Math.PI * 2 - Math.PI / 2;
        const val = dataArr[i] / 255;
        const barH = val * 44 + 3;
        const x1 = cx + Math.cos(angle) * innerR;
        const y1 = cy + Math.sin(angle) * innerR;
        const x2 = cx + Math.cos(angle) * (innerR + barH);
        const y2 = cy + Math.sin(angle) * (innerR + barH);
        vCtx.strokeStyle = 'rgba(255,255,255,' + (0.3 + val * 0.7) + ')';
        vCtx.lineWidth = 1.5;
        vCtx.beginPath();
        vCtx.moveTo(x1, y1);
        vCtx.lineTo(x2, y2);
        vCtx.stroke();
      }
      const avg = dataArr.reduce((a,b)=>a+b,0) / dataArr.length / 255;
      vCtx.beginPath();
      vCtx.arc(cx, cy, 6 + avg * 16, 0, Math.PI * 2);
      vCtx.fillStyle = 'rgba(255,255,255,' + (0.4 + avg * 0.6) + ')';
      vCtx.fill();
    }

    vCtx.beginPath();
    vCtx.arc(cx, cy, innerR - 2, 0, Math.PI * 2);
    vCtx.strokeStyle = 'rgba(255,255,255,0.08)';
    vCtx.lineWidth = 1;
    vCtx.stroke();
  }
  drawVisualizer();

  function togglePlay() {
    if (!audioCtx) setupVisualizer();
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    if (audio.paused) audio.play(); else audio.pause();
  }
  function toggleLoop() {
    isLooping = !isLooping;
    audio.loop = isLooping;
    document.getElementById('btnLoop').classList.toggle('active', isLooping);
  }
  function toggleMute() {
    isMuted = !isMuted;
    audio.muted = isMuted;
    document.getElementById('iconVol').style.display = isMuted ? 'none' : '';
    document.getElementById('iconMute').style.display = isMuted ? '' : 'none';
  }
  function setVolume(v) {
    audio.volume = parseFloat(v);
    document.getElementById('volPct').textContent = Math.round(v * 100) + '%';
    document.getElementById('volumeSlider').style.setProperty('--fill', (v * 100) + '%');
  }
  document.getElementById('volumeSlider').style.setProperty('--fill', '80%');

  function setStatus(txt) { document.getElementById('statusText').textContent = txt; }
  function onPlay() {
    document.getElementById('iconPlay').style.display = 'none';
    document.getElementById('iconPause').style.display = '';
    document.getElementById('statusDot').classList.add('playing');
    setStatus('Playing');
  }
  function onPause() {
    document.getElementById('iconPlay').style.display = '';
    document.getElementById('iconPause').style.display = 'none';
    document.getElementById('statusDot').classList.remove('playing');
    setStatus('Paused');
  }
  function onEnded() {
    document.getElementById('statusDot').classList.remove('playing');
    setStatus('Ended');
  }
  function updateProgress() {
    const cur = audio.currentTime, dur = audio.duration || 0;
    const pct = dur ? (cur / dur) * 100 : 0;
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressThumb').style.left = pct + '%';
    document.getElementById('curTime').textContent = fmt(cur);
    document.getElementById('durTime').textContent = fmt(dur);
  }
  function fmt(s) {
    if (!s || isNaN(s)) return '0:00';
    return Math.floor(s/60) + ':' + String(Math.floor(s%60)).padStart(2,'0');
  }
  document.getElementById('progressBar').addEventListener('click', e => {
    const rect = e.currentTarget.getBoundingClientRect();
    audio.currentTime = ((e.clientX - rect.left) / rect.width) * (audio.duration || 0);
  });

  initAudio();
</script>
</body>
</html>
