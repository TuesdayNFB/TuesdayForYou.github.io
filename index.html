<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TuesdayForYou</title>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Inter', sans-serif; }

    /* ── Background video ── */
    #bg-video {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover; z-index: 0;
      filter: brightness(0.35) grayscale(1);
      pointer-events: none;
      transition: filter 2s ease;
    }
    #bg-video.vivid { filter: brightness(0.5) grayscale(0.3); }

    /* ── Particle canvas ── */
    #particles {
      position: fixed; inset: 0; z-index: 1;
      pointer-events: none; opacity: 0;
      transition: opacity 2s ease 0.5s;
    }
    #particles.visible { opacity: 1; }

    /* ── Ripple canvas (click effect) ── */
    #ripple-canvas {
      position: fixed; inset: 0; z-index: 2;
      pointer-events: none;
    }

    .wash { position: fixed; inset: 0; z-index: 1; background: rgba(0,0,0,0.35); pointer-events: none; }

    /* ── Clock ── */
    #clock {
      position: fixed; top: 1.8rem; right: 2rem; z-index: 6;
      font-family: 'EB Garamond', serif; font-size: 1.1rem;
      font-weight: 400; letter-spacing: 0.12em;
      color: rgba(255,255,255,0.2);
      opacity: 0; transition: opacity 2s ease 1.5s;
    }
    #clock.visible { opacity: 1; }

    /* ── Visitor counter ── */
    #visitor-strip {
      position: fixed; top: 1.85rem; left: 2rem; z-index: 6;
      font-family: 'Inter', sans-serif; font-size: 0.55rem;
      font-weight: 300; letter-spacing: 0.22em; text-transform: uppercase;
      color: rgba(255,255,255,0.18);
      opacity: 0; transition: opacity 2s ease 1.8s;
      display: flex; align-items: center; gap: 6px;
    }
    #visitor-strip.visible { opacity: 1; }
    .visitor-dot { width: 4px; height: 4px; border-radius: 50%; background: rgba(255,255,255,0.35); animation: blink 2.4s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

    /* ── Enter screen ── */
    #enter-screen {
      position: fixed; inset: 0; z-index: 10;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: #000;
      transition: opacity 1.4s ease, visibility 1.4s ease;
    }
    #enter-screen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

    .pre-name {
      font-family: 'EB Garamond', serif;
      font-size: clamp(2rem, 5vw, 3.8rem);
      font-weight: 400; color: #fff; letter-spacing: 0.06em;
      margin-bottom: 3.5rem;
      opacity: 0; transform: translateY(12px);
      animation: fadeUp 1.2s cubic-bezier(0.4,0,0.2,1) 0.3s forwards;
    }
    .pre-name i { font-style: italic; color: rgba(255,255,255,0.35); }

    #enter-btn {
      font-family: 'Inter', sans-serif; font-weight: 300; font-size: 0.65rem;
      letter-spacing: 0.3em; text-transform: uppercase; color: rgba(255,255,255,0.7);
      background: transparent; border: 1px solid rgba(255,255,255,0.25);
      padding: 0.9rem 2.8rem; cursor: pointer;
      opacity: 0; transform: translateY(8px);
      animation: fadeUp 1.2s cubic-bezier(0.4,0,0.2,1) 0.7s forwards;
      transition: border-color 0.3s, color 0.3s, letter-spacing 0.3s;
      position: relative; overflow: hidden;
    }
    #enter-btn::before {
      content: ''; position: absolute; inset: 0;
      background: rgba(255,255,255,0.06);
      transform: translateX(-100%);
      transition: transform 0.4s ease;
    }
    #enter-btn:hover::before { transform: translateX(0); }
    #enter-btn:hover { border-color: rgba(255,255,255,0.7); color: #fff; letter-spacing: 0.4em; }

    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

    /* ── Main name ── */
    .name {
      font-family: 'EB Garamond', serif;
      font-size: clamp(2.6rem, 7vw, 6rem);
      font-weight: 400; color: #fff; letter-spacing: 0.06em;
      line-height: 1; text-align: center;
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      white-space: nowrap; z-index: 6;
      opacity: 0; transition: opacity 2s ease;
      cursor: default; user-select: none;
    }
    .name.visible { opacity: 1; }
    .name i { font-style: italic; color: rgba(255,255,255,0.4); }

    /* ── Glitch effect on hover ── */
    .name:hover { animation: glitch 0.4s steps(2) forwards; }
    @keyframes glitch {
      0%   { text-shadow: none; }
      20%  { text-shadow: -3px 0 rgba(255,80,80,0.7), 3px 0 rgba(80,200,255,0.7); letter-spacing: 0.09em; }
      40%  { text-shadow: 3px 0 rgba(255,80,80,0.7), -3px 0 rgba(80,200,255,0.7); letter-spacing: 0.04em; }
      60%  { text-shadow: -2px 0 rgba(255,80,80,0.5), 2px 0 rgba(80,200,255,0.5); }
      80%  { text-shadow: none; letter-spacing: 0.07em; }
      100% { text-shadow: none; letter-spacing: 0.06em; }
    }

    /* ── Bottom bar ── */
    #bottom {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 3;
      display: flex; justify-content: space-between; align-items: flex-end;
      padding: 0 2rem 1.8rem;
      opacity: 0; transition: opacity 2s ease 1.2s;
    }
    #bottom.visible { opacity: 1; }
    .date-label { font-family: 'Inter', sans-serif; font-size: 0.6rem; font-weight: 300; letter-spacing: 0.22em; text-transform: uppercase; color: rgba(255,255,255,0.25); }
    #mute-btn { background: transparent; border: none; cursor: pointer; display: flex; align-items: center; gap: 8px; color: rgba(255,255,255,0.3); font-family: 'Inter', sans-serif; font-size: 0.6rem; font-weight: 300; letter-spacing: 0.22em; text-transform: uppercase; transition: color 0.2s; }
    #mute-btn:hover { color: rgba(255,255,255,0.8); }
    .bars { display: flex; align-items: flex-end; gap: 2px; height: 12px; }
    .bars span { display: block; width: 2px; background: currentColor; border-radius: 1px; animation: pulse 1.4s ease-in-out infinite; }
    .bars span:nth-child(1) { height: 4px; animation-delay: 0s; }
    .bars span:nth-child(2) { height: 9px; animation-delay: 0.2s; }
    .bars span:nth-child(3) { height: 5px; animation-delay: 0.4s; }
    .bars span:nth-child(4) { height: 12px; animation-delay: 0.1s; }
    .bars span:nth-child(5) { height: 6px; animation-delay: 0.3s; }
    .bars.paused span { animation-play-state: paused; }
    @keyframes pulse { 0%,100%{transform:scaleY(1)} 50%{transform:scaleY(0.25)} }

    /* ── Icons ── */
    #icons {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 4;
      display: flex; justify-content: center; align-items: center;
      gap: 3rem; padding-bottom: 1.6rem;
      opacity: 0; pointer-events: none; transition: opacity 1s ease;
    }
    #icons.visible { opacity: 1; pointer-events: auto; }
    .icon-btn { display: flex; flex-direction: column; align-items: center; gap: 6px; background: transparent; border: none; cursor: pointer; color: rgba(255,255,255,0.35); text-decoration: none; transition: color 0.3s, transform 0.3s; }
    .icon-btn:hover { color: rgba(255,255,255,0.9); transform: translateY(-3px); }
    .icon-btn svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
    .icon-label { font-family: 'Inter', sans-serif; font-size: 0.55rem; font-weight: 300; letter-spacing: 0.2em; text-transform: uppercase; }

    /* ── Toast notification ── */
    #toast {
      position: fixed; top: 2rem; left: 50%; transform: translateX(-50%) translateY(-80px);
      z-index: 20; background: rgba(255,255,255,0.08);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.85);
      font-family: 'Inter', sans-serif; font-size: 0.6rem; font-weight: 300;
      letter-spacing: 0.2em; text-transform: uppercase;
      padding: 0.7rem 2rem; pointer-events: none;
      transition: transform 0.5s cubic-bezier(0.4,0,0.2,1), opacity 0.5s ease;
      opacity: 0;
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    /* ── Cursor trail ── */
    .cursor-dot {
      position: fixed; pointer-events: none; z-index: 100;
      width: 4px; height: 4px; border-radius: 50%;
      background: rgba(255,255,255,0.6);
      transform: translate(-50%, -50%);
      animation: dotFade 0.8s ease forwards;
    }
    @keyframes dotFade { to { opacity: 0; transform: translate(-50%,-50%) scale(0); } }

    /* ── Ambient glow on scroll/mouse ── */
    #glow {
      position: fixed; z-index: 1; pointer-events: none;
      width: 600px; height: 600px; border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.04) 0%, transparent 70%);
      transform: translate(-50%,-50%);
      transition: left 0.8s ease, top 0.8s ease;
      left: 50%; top: 50%;
    }

    /* ── Scanline overlay ── */
    #scanlines {
      position: fixed; inset: 0; z-index: 2; pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.03) 2px,
        rgba(0,0,0,0.03) 4px
      );
      opacity: 0.4;
    }

    /* ── Info modal ── */
    #info-modal {
      position: fixed; inset: 0; z-index: 15;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.7);
      opacity: 0; visibility: hidden;
      transition: opacity 0.4s ease, visibility 0.4s ease;
    }
    #info-modal.open { opacity: 1; visibility: visible; }
    .modal-box {
      background: rgba(10,10,10,0.95);
      border: 1px solid rgba(255,255,255,0.12);
      padding: 3rem; max-width: 420px; width: 90%;
      font-family: 'EB Garamond', serif;
      color: rgba(255,255,255,0.75);
      text-align: center;
      transform: translateY(20px);
      transition: transform 0.4s ease;
    }
    #info-modal.open .modal-box { transform: translateY(0); }
    .modal-box h2 { font-size: 1.6rem; font-weight: 400; margin-bottom: 1.2rem; color: #fff; letter-spacing: 0.05em; }
    .modal-box p { font-size: 1rem; line-height: 1.8; margin-bottom: 1.5rem; }
    .modal-close {
      font-family: 'Inter', sans-serif; font-size: 0.6rem; letter-spacing: 0.3em;
      text-transform: uppercase; color: rgba(255,255,255,0.4);
      background: transparent; border: 1px solid rgba(255,255,255,0.15);
      padding: 0.6rem 2rem; cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }
    .modal-close:hover { color: #fff; border-color: rgba(255,255,255,0.6); }

    /* ── Keyboard shortcut hint ── */
    #shortcut-hint {
      position: fixed; bottom: 5rem; right: 2rem; z-index: 6;
      font-family: 'Inter', sans-serif; font-size: 0.5rem;
      letter-spacing: 0.2em; text-transform: uppercase;
      color: rgba(255,255,255,0.12);
      opacity: 0; transition: opacity 1s ease 4s;
    }
    #shortcut-hint.visible { opacity: 1; }

    #yt-audio { position: fixed; top: -9999px; left: -9999px; width: 1px; height: 1px; }
  </style>
</head>
<body>

  <video id="bg-video" autoplay muted loop playsinline>
    <source src="BckVid.mp4" type="video/mp4">
  </video>

  <canvas id="particles"></canvas>
  <canvas id="ripple-canvas"></canvas>
  <div id="glow"></div>
  <div class="wash"></div>
  <div id="scanlines"></div>
  <div id="yt-audio"></div>

  <!-- Toast -->
  <div id="toast"></div>

  <!-- Clock -->
  <div id="clock"></div>

  <!-- Visitor strip -->
  <div id="visitor-strip">
    <div class="visitor-dot"></div>
    <span id="visitor-count">—</span> here now
  </div>

  <!-- Enter screen -->
  <div id="enter-screen">
    <p class="pre-name">Tuesday<i>For</i>You</p>
    <button id="enter-btn">enter</button>
  </div>

  <!-- Main name -->
  <h1 class="name" id="main-name">Tuesday<i>For</i>You</h1>

  <!-- Bottom bar -->
  <div id="bottom">
    <span class="date-label" id="day-label"></span>
    <button id="mute-btn">
      <div class="bars" id="bars"><span></span><span></span><span></span><span></span><span></span></div>
      <span id="mute-label">playing</span>
    </button>
  </div>

  <!-- Icon row -->
  <div id="icons">
    <a class="icon-btn" href="https://Discord.gg/luminox" target="_blank" id="discord-btn">
      <svg viewBox="0 0 24 24" fill="currentColor" stroke="none">
        <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.002.022.015.043.03.056a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/>
      </svg>
      <span class="icon-label">discord</span>
    </a>
    <button class="icon-btn" id="icon-mute-btn">
      <svg viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
      <span class="icon-label" id="icon-mute-label">music</span>
    </button>
    <button class="icon-btn" id="icon-info-btn">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12.01" y2="8"/><path d="M12 12v4"/></svg>
      <span class="icon-label">info</span>
    </button>
    <button class="icon-btn" id="icon-fullscreen-btn">
      <svg viewBox="0 0 24 24"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
      <span class="icon-label" id="fs-label">expand</span>
    </button>
  </div>

  <!-- Shortcut hint -->
  <div id="shortcut-hint">press M to mute · F to fullscreen</div>

  <!-- Info modal -->
  <div id="info-modal">
    <div class="modal-box">
      <h2>Tuesday<i style="font-style:italic;color:rgba(255,255,255,0.4)">For</i>You</h2>
      <p>A space that exists only on Tuesdays — and every other day you need it.</p>
      <p style="font-size:0.85rem; color:rgba(255,255,255,0.4); letter-spacing:0.06em;">join the community ↓</p>
      <a href="https://Discord.gg/luminox" target="_blank" style="display:inline-block; margin-bottom:1.5rem; font-family:'Inter',sans-serif; font-size:0.6rem; letter-spacing:0.25em; text-transform:uppercase; color:rgba(255,255,255,0.5); text-decoration:none; border-bottom:1px solid rgba(255,255,255,0.2); padding-bottom:2px;">discord.gg/luminox</a>
      <br/>
      <button class="modal-close" id="modal-close-btn">close</button>
    </div>
  </div>

  <script>
    /* ── Day label ── */
    const days = ['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];
    document.getElementById('day-label').textContent = days[new Date().getDay()];

    /* ── Clock ── */
    function updateClock() {
      const now = new Date();
      const h = String(now.getHours()).padStart(2,'0');
      const m = String(now.getMinutes()).padStart(2,'0');
      const s = String(now.getSeconds()).padStart(2,'0');
      document.getElementById('clock').textContent = h + ':' + m + ':' + s;
    }
    setInterval(updateClock, 1000);
    updateClock();

    /* ── Fake visitor count ── */
    const base = Math.floor(Math.random() * 18) + 7;
    document.getElementById('visitor-count').textContent = base;
    setInterval(() => {
      const delta = Math.random() < 0.5 ? 1 : -1;
      const el = document.getElementById('visitor-count');
      const cur = parseInt(el.textContent) || base;
      el.textContent = Math.max(4, cur + delta);
    }, 7000);

    /* ── Toast ── */
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2400);
    }

    /* ── Audio ── */
    let audioPlayer = null, muted = false, transitioned = false;

    const tag = document.createElement('script');
    tag.src = 'https://www.youtube.com/iframe_api';
    document.head.appendChild(tag);

    window.onYouTubeIframeAPIReady = function () {
      audioPlayer = new YT.Player('yt-audio', {
        videoId: 'FPI1iRapBbM',
        playerVars: { autoplay: 0, controls: 0, loop: 1, playlist: 'FPI1iRapBbM', rel: 0 },
        events: { onReady: function() {} }
      });
    };

    function toggleMute() {
      if (!audioPlayer) return;
      muted = !muted;
      audioPlayer[muted ? 'mute' : 'unMute']();
      document.getElementById('bars').classList.toggle('paused', muted);
      document.getElementById('mute-label').textContent = muted ? 'muted' : 'playing';
      document.getElementById('icon-mute-label').textContent = muted ? 'muted' : 'music';
      showToast(muted ? 'music off' : 'music on');
    }

    /* ── Enter ── */
    document.getElementById('enter-btn').addEventListener('click', function () {
      if (audioPlayer && audioPlayer.playVideo) {
        audioPlayer.playVideo();
        audioPlayer.setVolume(75);
      }
      document.getElementById('enter-screen').classList.add('hidden');
      setTimeout(() => {
        document.getElementById('main-name').classList.add('visible');
        document.getElementById('bottom').classList.add('visible');
        document.getElementById('clock').classList.add('visible');
        document.getElementById('visitor-strip').classList.add('visible');
        document.getElementById('particles').classList.add('visible');
        document.getElementById('shortcut-hint').classList.add('visible');
        document.getElementById('bg-video').classList.add('vivid');
      }, 200);

      setTimeout(() => {
        if (transitioned) return;
        transitioned = true;
        animateToCorner();
      }, 10000);
    });

    /* ── Animate name to corner ── */
    function animateToCorner() {
      const nameEl = document.getElementById('main-name');
      const startRect = nameEl.getBoundingClientRect();
      const startFontSize = parseFloat(window.getComputedStyle(nameEl).fontSize);
      const targetFontSize = Math.max(17, startFontSize * 0.27);
      const scale = targetFontSize / startFontSize;
      const targetX = 32, targetY = 29;
      const startCenterX = startRect.left + startRect.width / 2;
      const startCenterY = startRect.top + startRect.height / 2;
      const scaledW = startRect.width * scale;
      const scaledH = startRect.height * scale;
      const dx = (targetX + scaledW / 2) - startCenterX;
      const dy = (targetY + scaledH / 2) - startCenterY;
      nameEl.style.transition = 'transform 1.2s cubic-bezier(0.7,0,0.3,1)';
      nameEl.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px)) scale(${scale})`;
      setTimeout(() => {
        document.getElementById('icons').classList.add('visible');
      }, 700);
    }

    /* ── Mute buttons ── */
    document.getElementById('mute-btn').addEventListener('click', toggleMute);
    document.getElementById('icon-mute-btn').addEventListener('click', toggleMute);

    /* ── Info modal ── */
    document.getElementById('icon-info-btn').addEventListener('click', () => {
      document.getElementById('info-modal').classList.add('open');
    });
    document.getElementById('modal-close-btn').addEventListener('click', () => {
      document.getElementById('info-modal').classList.remove('open');
    });
    document.getElementById('info-modal').addEventListener('click', (e) => {
      if (e.target === document.getElementById('info-modal'))
        document.getElementById('info-modal').classList.remove('open');
    });

    /* ── Fullscreen ── */
    document.getElementById('icon-fullscreen-btn').addEventListener('click', () => {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
        document.getElementById('fs-label').textContent = 'shrink';
        showToast('fullscreen');
      } else {
        document.exitFullscreen();
        document.getElementById('fs-label').textContent = 'expand';
      }
    });

    /* ── Keyboard shortcuts ── */
    document.addEventListener('keydown', (e) => {
      const k = e.key.toLowerCase();
      if (k === 'm') toggleMute();
      if (k === 'f') document.getElementById('icon-fullscreen-btn').click();
      if (k === 'i') document.getElementById('icon-info-btn').click();
      if (k === 'escape') document.getElementById('info-modal').classList.remove('open');
    });

    /* ── Ambient glow follows mouse ── */
    document.addEventListener('mousemove', (e) => {
      document.getElementById('glow').style.left = e.clientX + 'px';
      document.getElementById('glow').style.top = e.clientY + 'px';
    });

    /* ── Cursor trail ── */
    let lastTrail = 0;
    document.addEventListener('mousemove', (e) => {
      const now = Date.now();
      if (now - lastTrail < 40) return;
      lastTrail = now;
      const dot = document.createElement('div');
      dot.className = 'cursor-dot';
      dot.style.left = e.clientX + 'px';
      dot.style.top = e.clientY + 'px';
      dot.style.opacity = String(Math.random() * 0.4 + 0.2);
      document.body.appendChild(dot);
      setTimeout(() => dot.remove(), 800);
    });

    /* ── Click ripple ── */
    const rc = document.getElementById('ripple-canvas');
    const rctx = rc.getContext('2d');
    rc.width = window.innerWidth; rc.height = window.innerHeight;
    const ripples = [];
    document.addEventListener('click', (e) => {
      if (e.target.closest('#enter-screen') || e.target.closest('#info-modal')) return;
      ripples.push({ x: e.clientX, y: e.clientY, r: 0, alpha: 0.35 });
    });
    function drawRipples() {
      rctx.clearRect(0, 0, rc.width, rc.height);
      for (let i = ripples.length - 1; i >= 0; i--) {
        const rp = ripples[i];
        rp.r += 4; rp.alpha -= 0.012;
        if (rp.alpha <= 0) { ripples.splice(i, 1); continue; }
        rctx.beginPath();
        rctx.arc(rp.x, rp.y, rp.r, 0, Math.PI * 2);
        rctx.strokeStyle = `rgba(255,255,255,${rp.alpha})`;
        rctx.lineWidth = 1;
        rctx.stroke();
      }
      requestAnimationFrame(drawRipples);
    }
    drawRipples();
    window.addEventListener('resize', () => {
      rc.width = window.innerWidth; rc.height = window.innerHeight;
    });

    /* ── Particle system ── */
    const pc = document.getElementById('particles');
    const pctx = pc.getContext('2d');
    pc.width = window.innerWidth; pc.height = window.innerHeight;
    const particles = [];
    const PARTICLE_COUNT = 55;

    for (let i = 0; i < PARTICLE_COUNT; i++) {
      particles.push({
        x: Math.random() * pc.width,
        y: Math.random() * pc.height,
        r: Math.random() * 1.2 + 0.3,
        vx: (Math.random() - 0.5) * 0.3,
        vy: -(Math.random() * 0.4 + 0.1),
        alpha: Math.random() * 0.4 + 0.05
      });
    }

    function drawParticles() {
      pctx.clearRect(0, 0, pc.width, pc.height);
      for (const p of particles) {
        p.x += p.vx; p.y += p.vy;
        if (p.y < -5) { p.y = pc.height + 5; p.x = Math.random() * pc.width; }
        pctx.beginPath();
        pctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        pctx.fillStyle = `rgba(255,255,255,${p.alpha})`;
        pctx.fill();
      }
      requestAnimationFrame(drawParticles);
    }
    drawParticles();
    window.addEventListener('resize', () => {
      pc.width = window.innerWidth; pc.height = window.innerHeight;
    });

    /* ── Discord hover easter egg ── */
    document.getElementById('discord-btn').addEventListener('mouseenter', () => {
      showToast('join the community');
    });
  </script>
</body>
</html>
