<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tuesday For You</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --cream: #f5ede0;
    --gold: #c9963a;
    --rust: #b5451b;
    --deep: #1a0f05;
  }

  body {
    background: var(--deep);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-family: 'Cormorant Garamond', serif;
  }

  .orb { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0; animation: orbFloat 12s ease-in-out infinite; }
  .orb1 { width: 500px; height: 500px; background: radial-gradient(circle, rgba(181,69,27,0.35) 0%, transparent 70%); top: -100px; left: -100px; animation-delay: 0s; }
  .orb2 { width: 600px; height: 600px; background: radial-gradient(circle, rgba(201,150,58,0.2) 0%, transparent 70%); bottom: -150px; right: -150px; animation-delay: 3s; }
  .orb3 { width: 350px; height: 350px; background: radial-gradient(circle, rgba(181,69,27,0.18) 0%, transparent 70%); top: 50%; left: 50%; transform: translate(-50%, -50%); animation-delay: 6s; }

  @keyframes orbFloat {
    0%   { opacity: 0; transform: scale(0.8) translate(0, 0); }
    25%  { opacity: 1; }
    50%  { transform: scale(1.1) translate(20px, -30px); }
    75%  { opacity: 0.7; }
    100% { opacity: 0; transform: scale(0.8) translate(0, 0); }
  }

  .particles { position: fixed; inset: 0; pointer-events: none; }
  .particle { position: absolute; width: 2px; height: 2px; background: var(--gold); border-radius: 50%; opacity: 0; animation: particleDrift linear infinite; }
  @keyframes particleDrift {
    0%   { opacity: 0; transform: translateY(100vh) scale(0); }
    10%  { opacity: 0.8; }
    90%  { opacity: 0.4; }
    100% { opacity: 0; transform: translateY(-10vh) scale(1.5); }
  }

  .scanline { position: fixed; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, rgba(201,150,58,0.4), transparent); animation: scanDown 8s ease-in-out infinite; opacity: 0; }
  @keyframes scanDown {
    0%   { top: 0; opacity: 0; }
    5%   { opacity: 1; }
    95%  { opacity: 0.3; }
    100% { top: 100vh; opacity: 0; }
  }

  /* FLOATING ICONS */
  .floating-icons { position: fixed; inset: 0; pointer-events: none; z-index: 10; }
  .icon-wrap {
    position: absolute;
    opacity: 0;
    animation: iconFloat linear infinite;
    pointer-events: auto;
    cursor: pointer;
  }
  .icon-wrap svg {
    display: block;
    filter: drop-shadow(0 0 10px rgba(201,150,58,0.2));
    transition: filter 0.3s ease, transform 0.3s ease;
  }
  .icon-wrap:hover svg {
    filter: drop-shadow(0 0 24px rgba(201,150,58,0.8));
    transform: scale(1.2) !important;
  }
  @keyframes iconFloat {
    0%   { opacity: 0; transform: translateY(0px) scale(0.85); }
    8%   { opacity: 1; }
    30%  { transform: translateY(-20px) rotate(3deg) scale(1.02); }
    60%  { transform: translateY(-10px) rotate(-2deg) scale(0.98); }
    92%  { opacity: 0.65; }
    100% { opacity: 0; transform: translateY(-5px) scale(0.85); }
  }

  #intro-screen {
    position: fixed; inset: 0; z-index: 20;
    display: flex; align-items: center; justify-content: center;
  }

  .layout { display: flex; align-items: center; justify-content: center; width: 100vw; gap: 0; padding: 2rem; }

  .side-quote { width: 220px; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; gap: 1.4rem; opacity: 0; }
  .side-quote.left  { transform: translateX(-30px); animation: fadeInLeft  1.4s cubic-bezier(0.16,1,0.3,1) forwards 3.2s; }
  .side-quote.right { transform: translateX(30px);  animation: fadeInRight 1.4s cubic-bezier(0.16,1,0.3,1) forwards 3.6s; }
  @keyframes fadeInLeft  { to { opacity: 1; transform: translateX(0); } }
  @keyframes fadeInRight { to { opacity: 1; transform: translateX(0); } }

  .quote-rule { width: 1px; height: 0; background: linear-gradient(180deg, transparent, var(--gold), transparent); animation: expandRuleV 1.4s ease forwards; }
  .side-quote.left  .quote-rule { animation-delay: 3.8s; }
  .side-quote.right .quote-rule { animation-delay: 4.2s; }
  @keyframes expandRuleV { to { height: 60px; } }

  .quote-text { font-family: 'Cormorant Garamond', serif; font-weight: 300; font-style: italic; font-size: clamp(0.78rem, 1.3vw, 0.92rem); line-height: 1.85; letter-spacing: 0.04em; color: rgba(245,237,224,0.38); text-align: center; max-width: 180px; opacity: 0; transform: translateY(14px); }
  .side-quote.left  .quote-text { animation: fadeUp 1.2s ease forwards 4.0s; }
  .side-quote.right .quote-text { animation: fadeUp 1.2s ease forwards 4.4s; }

  .quote-attr { font-family: 'Cormorant Garamond', serif; font-weight: 300; font-size: 0.7rem; letter-spacing: 0.3em; text-transform: uppercase; color: rgba(201,150,58,0.35); text-align: center; opacity: 0; transform: translateY(10px); }
  .side-quote.left  .quote-attr { animation: fadeUp 1.2s ease forwards 4.3s; }
  .side-quote.right .quote-attr { animation: fadeUp 1.2s ease forwards 4.7s; }

  .center { text-align: center; position: relative; flex: 1; max-width: 680px; }

  .day-label { font-family: 'Cormorant Garamond', serif; font-weight: 300; font-style: italic; font-size: clamp(0.9rem, 2vw, 1.1rem); letter-spacing: 0.5em; color: var(--gold); text-transform: uppercase; opacity: 0; transform: translateY(20px); animation: fadeUp 1.2s ease forwards 0.4s; margin-bottom: 1.5rem; }

  .title { font-family: 'Playfair Display', serif; font-weight: 400; font-size: clamp(3.5rem, 10vw, 8rem); line-height: 1; color: var(--cream); opacity: 0; transform: translateY(30px) scale(0.96); animation: heroReveal 1.6s cubic-bezier(0.16,1,0.3,1) forwards 0.8s; position: relative; }
  .title .word-tuesday { display: block; position: relative; }
  .title .word-for { display: block; font-style: italic; font-size: 0.55em; color: var(--gold); letter-spacing: 0.12em; margin: 0.2em 0; }
  .title .word-you { display: block; }

  .title .word-tuesday::after { content: 'Tuesday'; position: absolute; inset: 0; background: linear-gradient(90deg, transparent 0%, rgba(201,150,58,0.6) 50%, transparent 100%); background-size: 200% 100%; -webkit-background-clip: text; background-clip: text; color: transparent; animation: shimmer 4s ease-in-out infinite 2.5s; opacity: 0; animation-fill-mode: forwards; }
  @keyframes shimmer {
    0%   { background-position: -200% 0; opacity: 0; }
    10%  { opacity: 1; }
    50%  { background-position: 200% 0; }
    60%  { opacity: 0; }
    100% { background-position: 200% 0; opacity: 0; }
  }

  .deco-line { width: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); margin: 2rem auto; animation: expandLine 1.4s ease forwards 2s; }
  @keyframes expandLine { to { width: 280px; } }

  .subtitle { font-family: 'Cormorant Garamond', serif; font-weight: 300; font-style: italic; font-size: clamp(0.85rem, 2vw, 1rem); letter-spacing: 0.3em; color: rgba(245,237,224,0.4); text-transform: uppercase; opacity: 0; transform: translateY(10px); animation: fadeUp 1s ease forwards 2.4s; }

  .ring { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border-radius: 50%; border: 1px solid rgba(201,150,58,0.15); opacity: 0; animation: ringPulse 5s ease-out infinite; }
  .ring:nth-child(1) { width: 340px; height: 340px; animation-delay: 2s; }
  .ring:nth-child(2) { width: 480px; height: 480px; animation-delay: 2.8s; }
  .ring:nth-child(3) { width: 620px; height: 620px; animation-delay: 3.6s; }
  @keyframes ringPulse {
    0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
    20%  { opacity: 0.6; }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
  }

  @keyframes fadeUp    { to { opacity: 1; transform: translateY(0); } }
  @keyframes heroReveal{ to { opacity: 1; transform: translateY(0) scale(1); } }

  .music-indicator { position: fixed; bottom: 2rem; right: 2rem; display: flex; align-items: center; gap: 0.6rem; opacity: 0; animation: fadeUp 1s ease forwards 3s; z-index: 100; }
  .music-label { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 0.8rem; letter-spacing: 0.2em; color: rgba(201,150,58,0.5); }
  .bars { display: flex; align-items: flex-end; gap: 3px; height: 18px; }
  .bar { width: 3px; background: var(--gold); opacity: 0.5; border-radius: 2px; animation: barBounce 0.8s ease-in-out infinite alternate; }
  .bar:nth-child(1) { height: 8px;  animation-delay: 0s; }
  .bar:nth-child(2) { height: 14px; animation-delay: 0.15s; }
  .bar:nth-child(3) { height: 10px; animation-delay: 0.3s; }
  .bar:nth-child(4) { height: 16px; animation-delay: 0.1s; }
  .bar:nth-child(5) { height: 7px;  animation-delay: 0.25s; }
  @keyframes barBounce { from { transform: scaleY(0.3); } to { transform: scaleY(1); } }

  #yt-player { display: none; }
</style>
</head>
<body>

<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>
<div class="scanline"></div>
<div class="particles" id="particles"></div>

<div style="position:fixed;inset:0;pointer-events:none;z-index:5;">
  <div class="ring"></div>
  <div class="ring"></div>
  <div class="ring"></div>
</div>

<!-- FLOATING SOCIAL ICONS -->
<div class="floating-icons" id="floatingIcons"></div>

<div id="intro-screen">
  <div class="layout">

    <div class="side-quote left">
      <div class="quote-rule"></div>
      <p class="quote-text">"I have waited for this day longer than I have waited for anything."</p>
      <span class="quote-attr">— neruda</span>
      <div class="quote-rule"></div>
    </div>

    <div class="center">
      <p class="day-label">every single week</p>
      <h1 class="title">
        <span class="word-tuesday">Tuesday</span>
        <span class="word-for">for</span>
        <span class="word-you">You</span>
      </h1>
      <div class="deco-line"></div>
      <p class="subtitle">always &nbsp;&bull;&nbsp; forever &nbsp;&bull;&nbsp; yours</p>
    </div>

    <div class="side-quote right">
      <div class="quote-rule"></div>
      <p class="quote-text">"Whatever our souls are made of, yours and mine are the same."</p>
      <span class="quote-attr">— brontë</span>
      <div class="quote-rule"></div>
    </div>

  </div>
</div>

<div class="music-indicator">
  <span class="music-label">now playing</span>
  <div class="bars">
    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    <div class="bar"></div><div class="bar"></div>
  </div>
</div>

<div id="yt-player"></div>

<script>
  // Particles
  const pc = document.getElementById('particles');
  for (let i = 0; i < 55; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + 'vw';
    p.style.width = p.style.height = (Math.random() * 2 + 1) + 'px';
    p.style.animationDuration = (Math.random() * 18 + 10) + 's';
    p.style.animationDelay = (Math.random() * 15) + 's';
    p.style.opacity = Math.random() * 0.6;
    pc.appendChild(p);
  }

  // Social icons — all tinted gold to match the palette
  const icons = [
    {
      name: 'Discord',
      svg: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.002.022.015.043.033.055a19.86 19.86 0 0 0 5.993 3.03.077.077 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z" fill="#c9963a"/></svg>`
    },
    {
      name: 'YouTube',
      svg: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z" fill="#c9963a"/></svg>`
    },
    {
      name: 'Spotify',
      svg: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z" fill="#c9963a"/></svg>`
    },
    {
      name: 'Instagram',
      svg: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zM12 16a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.881z" fill="#c9963a"/></svg>`
    },
    {
      name: 'TikTok',
      svg: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12.525.02c1.31-.02 2.61-.01 3.91-.02.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v4.03c-1.44-.05-2.89-.35-4.2-.97-.57-.26-1.1-.59-1.62-.93-.01 2.92.01 5.84-.02 8.75-.08 1.4-.54 2.79-1.35 3.94-1.31 1.92-3.58 3.17-5.91 3.21-1.43.08-2.86-.31-4.08-1.03-2.02-1.19-3.44-3.37-3.65-5.71-.02-.5-.03-1-.01-1.49.18-1.9 1.12-3.72 2.58-4.96 1.66-1.44 3.98-2.13 6.15-1.72.02 1.48-.04 2.96-.04 4.44-.99-.32-2.15-.23-3.02.37-.63.41-1.11 1.04-1.36 1.75-.21.51-.15 1.07-.14 1.61.24 1.64 1.82 3.02 3.5 2.87 1.12-.01 2.19-.66 2.77-1.61.19-.33.4-.67.41-1.06.1-1.79.06-3.57.07-5.36.01-4.03-.01-8.05.02-12.07z" fill="#c9963a"/></svg>`
    },
    {
      name: 'X',
      svg: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M18.901 1.153h3.68l-8.04 9.19L24 22.846h-7.406l-5.8-7.584-6.638 7.584H.474l8.6-9.83L0 1.154h7.594l5.243 6.932ZM17.61 20.644h2.039L6.486 3.24H4.298Z" fill="#c9963a"/></svg>`
    },
    {
      name: 'Twitch',
      svg: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M11.571 4.714h1.715v5.143H11.57zm4.715 0H18v5.143h-1.714zM6 0L1.714 4.286v15.428h5.143V24l4.286-4.286h3.428L22.286 12V0zm14.571 11.143l-3.428 3.428h-3.429l-3 3v-3H6.857V1.714h13.714z" fill="#c9963a"/></svg>`
    },
    {
      name: 'SoundCloud',
      svg: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M11.56 8.87V17h8.76c1.5-.01 2.68-1.26 2.68-2.78 0-1.52-1.18-2.77-2.68-2.78a2.63 2.63 0 0 0-.7.1 4.33 4.33 0 0 0-.64-4.3 4.11 4.11 0 0 0-5.82-.62 4.35 4.35 0 0 0-1.6 3.25M0 15.22A1.78 1.78 0 0 0 1.78 17h1.78V13.44H1.78A1.78 1.78 0 0 0 0 15.22m4.44-3.56V17h1.78V10.9a3.66 3.66 0 0 0-1.78.76m2.67-.53V17h1.78V9.78a4.08 4.08 0 0 0-1.78 1.35m2.67-1.69V17h1V8.87a4.23 4.23 0 0 0-1 .57" fill="#c9963a"/></svg>`
    }
  ];

  // Spawn floating icons across the screen
  const container = document.getElementById('floatingIcons');

  function spawnIcon(iconData) {
    const wrap = document.createElement('div');
    wrap.className = 'icon-wrap';

    const size = 32 + Math.random() * 26;
    const x = 2 + Math.random() * 92;
    const y = 4 + Math.random() * 87;
    const duration = 10 + Math.random() * 16;
    const delay = Math.random() * 14;
    const rotate = (Math.random() - 0.5) * 28;

    wrap.style.cssText = `left:${x}vw;top:${y}vh;animation-duration:${duration}s;animation-delay:${delay}s;`;
    wrap.innerHTML = iconData.svg;
    const svg = wrap.querySelector('svg');
    svg.setAttribute('width', size);
    svg.setAttribute('height', size);
    svg.style.transform = `rotate(${rotate}deg)`;
    svg.style.opacity = (0.25 + Math.random() * 0.45).toFixed(2);

    container.appendChild(wrap);
  }

  // Spawn each icon, some twice for density
  icons.forEach((icon, i) => {
    spawnIcon(icon);
    if (i % 2 === 0) spawnIcon(icon);
  });

  // YouTube
  var tag = document.createElement('script');
  tag.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(tag);
  function onYouTubeIframeAPIReady() {
    new YT.Player('yt-player', {
      height: '1', width: '1',
      videoId: 'eeuObHs01VM',
      playerVars: { autoplay: 1, loop: 1, playlist: 'eeuObHs01VM', controls: 0, mute: 0 },
      events: { onReady: function(e) { e.target.playVideo(); } }
    });
  }
</script>
</body>
</html>
